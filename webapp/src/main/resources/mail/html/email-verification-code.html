<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.emailVerification.emailTitle}">Verify email</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <!-- LOGO -->
    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;">
            <img src="cid:logo" alt="Ryden"
                 style="height:32px; width:auto; vertical-align:middle;"/> Ryden
        </span>
    </div>

    <!-- TITLE -->
    <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
       th:text="#{mail.emailVerification.emailTitle}">
        Verify email
    </p>

    <!-- INTRO -->
    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:20px;"
       th:text="#{mail.emailVerification.intro}">
        Use this code
    </p>

    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>

    <!-- CODE CARD -->
    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;
                padding:28px 20px; margin-bottom:24px; text-align:center;">
        <p style="font-size:13px; color:#6b7280; margin:0 0 12px 0;"
           th:text="#{mail.emailVerification.emailTitle}">Verify email</p>
        <p style="font-size:36px; font-weight:700; letter-spacing:0.25em;
                  color:#1e1b4b; margin:0 0 12px 0;"
           th:text="${code}">000000</p>
        <p style="font-size:12px; color:#9ca3af; margin:0;"
           th:text="#{mail.emailVerification.expiry}">Valid 5 minutes</p>
    </div>

    <!-- CTA BUTTON -->
    <div style="margin-bottom:20px;">
        <a th:href="${verifyUrl}"
           style="display:inline-block; padding:12px 24px; background-color:#4338ca;
                  color:#ffffff; text-decoration:none; border-radius:8px;
                  font-size:14px; font-weight:600;"
           th:text="#{mail.emailVerification.openVerifyPage}">
            Open
        </a>
    </div>

    <!-- FALLBACK LINK -->
    <p style="font-size:12px; color:#9ca3af; line-height:1.8; margin-bottom:20px;">
        <span th:text="#{mail.emailVerification.fallbackLink}">Link help</span><br/>
        <span th:text="${verifyUrl}" style="word-break:break-all; color:#4338ca;">https://</span>
    </p>

    <!-- FOOTER -->
    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>
    <p style="font-size:12px; color:#9ca3af; line-height:1.8;"
       th:text="#{mail.common.footer}">
        Footer
    </p>

    <p style="font-size:18px; color:#9ca3af; letter-spacing:2px; margin-top:16px;">···</p>

</div>
</body>
</html>
