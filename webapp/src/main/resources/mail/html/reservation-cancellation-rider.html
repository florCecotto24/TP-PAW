<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{mail.reservationCancelled.emailTitle}">Reservation cancelled</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

  <!-- LOGO -->
  <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;">
            <img src="cid:logo" alt="Ryden"
                 style="height:32px; width:auto; vertical-align:middle;"/> Ryden
        </span>
  </div>

  <!-- TITLE -->
  <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
     th:text="#{mail.reservationCancelled.emailTitle}">
    Reservation cancelled
  </p>
  <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
     th:text="#{mail.common.greeting(${riderFullName})}">
    Hello,
  </p>

  <!-- INTRO -->
  <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:20px;"
     th:text="#{mail.reservationCancelled.introRider}">
    Intro
  </p>

  <!-- DIVIDER -->
  <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>

  <!-- RESERVATION DETAILS CARD -->
  <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;
                padding:20px; margin-bottom:24px;">

    <p style="font-size:14px; font-weight:700; color:#1e1b4b; margin-bottom:16px;">
      <span th:text="#{mail.reservationConfirmation.reservationDetails}">Reservation #</span>
    </p>

    <!-- Vehicle -->
    <div style="display:flex; justify-content:space-between; align-items:center;
                    padding:10px 0; border-top:1px solid #f3f4f6; font-size:13px;">
      <span style="color:#6b7280;" th:text="#{mail.reservationConfirmation.vehicle}">Vehicle</span>
      &nbsp;
      <span style="font-weight:600; color:#1e1b4b;" th:text="${vehicleLabel}">—</span>
    </div>

    <!-- Pickup -->
    <div style="display:flex; justify-content:space-between; align-items:center;
                    padding:10px 0; border-top:1px solid #f3f4f6; font-size:13px;">
      <span style="color:#6b7280;" th:text="#{mail.reservationConfirmation.pickup}">Pickup</span>
      &nbsp;
      <span style="font-weight:600; color:#1e1b4b;" th:text="${startDateFormatted}">—</span>
    </div>

    <!-- Return -->
    <div style="display:flex; justify-content:space-between; align-items:center;
                    padding:10px 0; border-top:1px solid #f3f4f6; font-size:13px;">
      <span style="color:#6b7280;" th:text="#{mail.reservationConfirmation.returnLabel}">Return</span>
      &nbsp;
      <span style="font-weight:600; color:#1e1b4b;" th:text="${endDateFormatted}">—</span>
    </div>

    <!-- Total Price -->
    <div style="display:flex; justify-content:space-between; align-items:center;
                  padding:10px 0; border-top:1px solid #f3f4f6; font-size:13px;">
      <span style="color:#6b7280;" th:text="#{mail.reservationConfirmation.totalPrice}">ReservationTotal</span>
      &nbsp;
      <span style="font-weight:600; color:#1e1b4b;">
        $<span th:text="${reservationTotal}">—</span>
      </span>
    </div>

    <!-- Delivery Location (conditional) -->
    <div th:if="${hasDeliveryLocation}"
         style="display:flex; justify-content:space-between; align-items:center;
                    padding:10px 0; border-top:1px solid #f3f4f6; font-size:13px;">
      <span style="color:#6b7280;" th:text="#{mail.reservationConfirmation.deliveryLocation}">Location</span>
      &nbsp;
      <span style="font-weight:600; color:#1e1b4b;" th:text="${deliveryLocation}">—</span>
    </div>

  </div>

  <!-- CTA BUTTON -->
  <div style="margin-bottom:20px;">
    <a th:href="${ctaUrl}"
       style="display:inline-block; padding:12px 24px; background-color:#4338ca;
                  color:#ffffff; text-decoration:none; border-radius:8px;
                  font-size:14px; font-weight:600;"
       th:text="#{mail.reservationConfirmation.viewListing}">
      View listing
    </a>
  </div>

  <!-- FOOTER -->
  <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>
  <p style="font-size:12px; color:#9ca3af; line-height:1.8;"
     th:text="#{mail.common.footer}">
    Footer
  </p>

  <p style="font-size:18px; color:#9ca3af; letter-spacing:2px; margin-top:16px;">···</p>

</div>
</body>
</html>
