<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.paymentProofSubmittedOwner.emailTitle}">Payment proof</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;"><img src="cid:logo"
                                                                           alt="Ryden"
                                                                           style="height:32px; width:auto; vertical-align:middle;"/> Ryden</span>
    </div>

    <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
       th:text="#{mail.paymentProofSubmittedOwner.emailTitle}">
        Payment proof
    </p>
    <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
       th:text="#{mail.common.greeting(${ownerFullName})}">
        Hello,
    </p>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:16px;"
       th:text="#{mail.paymentProofSubmittedOwner.intro(${riderFullName}, ${vehicleLabel})}">
        Intro
    </p>

    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px; padding:16px 20px; margin-bottom:20px;">
        <p style="font-size:13px; margin:8px 0; color:#6b7280;">
            <span th:text="#{mail.reservationConfirmation.vehicle}">Vehicle</span>
            <strong style="color:#1e1b4b;" th:text="${vehicleLabel}">—</strong>
        </p>
        <p style="font-size:13px; margin:8px 0; color:#6b7280;">
            <span th:text="#{mail.reservationConfirmation.pickup}">Pickup</span>
            <strong style="color:#1e1b4b;" th:text="${startDateFormatted}">—</strong>
        </p>
        <p style="font-size:13px; margin:8px 0; color:#6b7280;">
            <span th:text="#{mail.reservationConfirmation.returnLabel}">Return</span>
            <strong style="color:#1e1b4b;" th:text="${endDateFormatted}">—</strong>
        </p>
    </div>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:16px;"
       th:text="#{mail.paymentProofSubmittedOwner.actionHint}">
        Action hint
    </p>

    <div style="margin-bottom:20px;">
        <a th:href="${ctaUrl}"
           style="display:inline-block; padding:12px 24px; background-color:#4338ca;
                color:#ffffff; text-decoration:none; border-radius:8px;
                font-size:14px; font-weight:600;"
           th:text="#{mail.paymentProofSubmittedOwner.cta}">
            Review
        </a>
    </div>

    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>
    <p style="font-size:12px; color:#9ca3af; line-height:1.8;"
       th:text="#{mail.common.footer}">
        Footer
    </p>

    <p style="font-size:18px; color:#9ca3af; letter-spacing:2px; margin-top:16px;">···</p>

</div>
</body>
</html>
