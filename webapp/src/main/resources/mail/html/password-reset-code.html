<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{mail.passwordReset.emailTitle}">Reset password</title>
</head>
<body style="font-family: system-ui, Segoe UI, Arial, sans-serif; line-height: 1.5; color: #1a1a1a;">
<p th:text="#{mail.passwordReset.intro}">Use this code</p>
<p style="font-size: 2rem; font-weight: 700; letter-spacing: 0.25em; margin: 16px 0;" th:text="${code}">000000</p>
<p th:text="#{mail.passwordReset.expiry}">Valid 5 minutes</p>
<p style="margin: 24px 0;">
    <a th:href="${resetUrl}"
       style="display: inline-block; padding: 12px 20px; background: #2563eb; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: 600;"
       th:text="#{mail.passwordReset.openResetPage}">Open</a>
</p>
<p style="font-size: 0.9em; color: #555;">
    <span th:text="#{mail.passwordReset.fallbackLink}"></span><br/>
    <span th:text="${resetUrl}" style="word-break: break-all;">https://</span>
</p>
<p style="font-size: 0.85em; color: #777;" th:text="#{mail.common.footer}">Ryden</p>
</body>
</html>
