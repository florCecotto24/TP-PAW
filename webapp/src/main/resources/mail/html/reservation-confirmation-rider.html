<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.reservationRequestSent.emailTitle}">Reservation request sent</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <!-- LOGO -->
    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;"><img src="cid:logo"
                                                                           alt="Ryden"
                                                                           style="height:32px; width:auto; vertical-align:middle;"/> Ryden</span>
    </div>

    <!-- TITLE -->
    <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
       th:text="#{mail.reservationRequestSent.emailTitle}">
        Reservation request sent
    </p>
    <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
       th:text="#{mail.common.greeting(${riderFullName})}">
        Hello,
    </p>

    <!-- INTRO -->
    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:20px;"
       th:text="#{mail.reservationRequestSent.introRider}">
        Intro
    </p>

    <!-- DIVIDER -->
    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>

    <!-- RESERVATION DETAILS CARD -->
    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;
                padding:20px; margin-bottom:24px;">

        <p style="font-size:14px; font-weight:700; color:#1e1b4b; margin-bottom:16px;">
            <span th:text="#{mail.reservationConfirmation.reservationDetails}">Reservation #</span>
        </p>

        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
               style="font-size:13px; border-collapse:collapse;">
            <tr>
                <td style="color:#6b7280; padding:10px 16px 10px 0; vertical-align:top; width:42%; border-top:1px solid #f3f4f6;"
                    th:text="#{mail.reservationConfirmation.vehicle}">Vehicle</td>
                <td style="font-weight:600; color:#1e1b4b; padding:10px 0; vertical-align:top; word-break:break-word; border-top:1px solid #f3f4f6;"
                    th:text="${vehicleLabel}">—</td>
            </tr>
            <tr>
                <td style="color:#6b7280; padding:10px 16px 10px 0; vertical-align:top; border-top:1px solid #f3f4f6;"
                    th:text="#{mail.reservationConfirmation.pickup}">Pickup</td>
                <td style="font-weight:600; color:#1e1b4b; padding:10px 0; vertical-align:top; word-break:break-word; border-top:1px solid #f3f4f6;"
                    th:text="${startDateFormatted}">—</td>
            </tr>
            <tr>
                <td style="color:#6b7280; padding:10px 16px 10px 0; vertical-align:top; border-top:1px solid #f3f4f6;"
                    th:text="#{mail.reservationConfirmation.returnLabel}">Return</td>
                <td style="font-weight:600; color:#1e1b4b; padding:10px 0; vertical-align:top; word-break:break-word; border-top:1px solid #f3f4f6;"
                    th:text="${endDateFormatted}">—</td>
            </tr>
            <tr>
                <td style="color:#6b7280; padding:10px 16px 10px 0; vertical-align:top; border-top:1px solid #f3f4f6;"
                    th:text="#{mail.reservationConfirmation.totalPrice}">Total</td>
                <td style="font-weight:600; color:#1e1b4b; padding:10px 0; vertical-align:top; border-top:1px solid #f3f4f6;">
                    $<span th:text="${reservationTotal}">—</span>
                </td>
            </tr>
            <tr th:if="${hasDeliveryLocation}">
                <td style="color:#6b7280; padding:10px 16px 10px 0; vertical-align:top; border-top:1px solid #f3f4f6;"
                    th:text="#{mail.reservationConfirmation.deliveryLocation}">Location</td>
                <td style="font-weight:600; color:#1e1b4b; padding:10px 0; vertical-align:top; word-break:break-word; border-top:1px solid #f3f4f6; white-space:pre-wrap;"
                    th:text="${deliveryLocation}">—</td>
            </tr>
        </table>

    </div>

    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;
                padding:20px; margin-bottom:24px;">
        <p style="font-size:14px; font-weight:700; color:#1e1b4b; margin-bottom:16px;">
            <span th:text="#{mail.reservationConfirmation.transferDetails}">Transfer details #</span>
        </p>

        <!-- cbu -->
        <div style="display:flex; justify-content:space-between; align-items:center;
                  padding:10px 0; border-top:1px solid #f3f4f6; font-size:13px;">
            <span style="color:#6b7280;" th:text="#{mail.reservationConfirmation.ownerCbu}">ownerCbu</span>
            &nbsp;
            <span style="font-weight:600; color:#1e1b4b;" th:text=" ${ownerCbu}">—</span>
        </div>
    </div>
    <!-- CTA BUTTON -->
    <div style="margin-bottom:20px;">
        <div style="margin-bottom:10px;">
        <a th:href="${ctaUrlRider}"
           style="display:inline-block; padding:12px 24px; background-color:#4338ca;
                color:#ffffff; text-decoration:none; border-radius:8px;
                font-size:14px; font-weight:600;"
           th:text="#{mail.reservationConfirmation.viewReservation}">
            View reservation
        </a>
        </div>
        <p style="font-size:12px; color:#4b5563; line-height:1.6; margin:0;">
            <span th:text="#{mail.common.fallbackAuthLinkCopy}">If the button does not work</span><br/>
            <a th:href="${ctaUrlRider}" th:text="${ctaUrlRider}" style="word-break:break-all; color:#4338ca;">https://</a>
        </p>
    </div>

    <!-- FOOTER -->
    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>
    <p style="font-size:12px; color:#9ca3af; line-height:1.8;"
       th:text="#{mail.common.footer}">
        Footer
    </p>

    <!-- PLANE-STYLE DOTS -->
    <p style="font-size:18px; color:#9ca3af; letter-spacing:2px; margin-top:16px;">···</p>

</div>
</body>
</html>
