# --- Mail: reservation (request vs confirmed) ---
# English (default / fallback). Copy is chosen from the recipient's message language.
# Locale files: mail/messages/MailMessages_es.properties (es), mail/messages/MailMessages_en.properties (en: empty, inherits this file).

mail.common.footer=This message was sent automatically. Please do not reply to this email.
mail.common.fallbackAuthLinkCopy=If the button does not work, copy and paste this link into your browser:
mail.common.greeting=Hello {0},

# First email after the rider submits the form (payment proof still pending)
mail.reservationRequestSent.emailTitle=Reservation request sent
mail.reservationRequestSent.introRider=We received your reservation request. It is not final until you upload a payment receipt within the deadline. Here are the details:
mail.reservationRequestSent.introOwner=You have a new reservation request pending payment proof. Here are the details:
mail.reservationRequestSent.subject=Reservation request sent — {0}

# Rider only, after payment proof is uploaded (full address including street number is shown)
mail.reservationConfirmedAfterProof.emailTitle=Reservation confirmed
mail.reservationConfirmedAfterProof.introRider=We received your payment receipt. Your reservation is confirmed. Full pickup and return address:
mail.reservationConfirmedAfterProof.subject=Reservation confirmed — {0}

# Shared detail labels (first email, reminders, tables)
mail.reservationConfirmation.reservationDetails=Reservation Details
mail.reservationConfirmation.transferDetails=Transfer Details
mail.reservationConfirmation.vehicle=Vehicle:
mail.reservationConfirmation.pickup=Pickup:
mail.reservationConfirmation.returnLabel=Return:
mail.reservationConfirmation.totalPrice=Total price:
mail.reservationConfirmation.deliveryLocation=Pickup and return location:
mail.reservationConfirmation.ownerCbu=Owner's CBU:
mail.reservationConfirmation.viewReservation=View reservation
mail.reservationConfirmation.viewListing=View listing
mail.reservationConfirmation.promptContactOwner=If you have any questions, please contact the owner of the vehicle:
mail.reservationConfirmation.promptContactRider=If you have any questions, please contact the rider:
mail.reservationConfirmation.credentialsLine=Name: {0}, Email: {1}

# Email verification
mail.emailVerification.emailTitle=Verify your email
mail.emailVerification.subject=Your verification code
mail.emailVerification.intro=Enter this verification code on the site (valid for 5 minutes):
mail.emailVerification.expiry=If you did not request this, you can ignore this message.
mail.emailVerification.openVerifyPage=Go to verification page

# Legacy user initial password
mail.migratedPassword.emailTitle=Your Ryden sign-in password
mail.migratedPassword.subject=Your new temporary password
mail.migratedPassword.intro=We created a password for your existing account (it did not have one yet). Use it to sign in, then verify your email with the code we may send next.
mail.migratedPassword.nextSteps=After signing in, complete email verification if prompted. You can change this password from your profile.

# Password reset
mail.passwordReset.emailTitle=Reset your password
mail.passwordReset.subject=Your password reset code
mail.passwordReset.intro=Enter this code on the site to set a new password (valid for 5 minutes):
mail.passwordReset.expiry=If you did not request a reset, you can ignore this message.
mail.passwordReset.openResetPage=Continue password reset

# Reservation cancelled
mail.reservationCancelled.emailTitle=Reservation cancelled
mail.reservationCancelled.subject=Reservation cancelled — {0}
mail.reservationCancelled.introRider=We inform you that your reservation has been cancelled. Here are the details of the cancelled reservation:
mail.reservationCancelled.introOwner=We inform you that a reservation has been cancelled. Here are the details of the cancelled reservation:

# Reservation reminder
mail.reservationReminder.subject=You have a reservation coming up
mail.reservationReminder.emailTitle=Reservation reminder
mail.reservationReminder.introRider=This is a reminder for your upcoming reservation. Here are the details:
mail.reservationReminder.viewReservation=View reservation

#Listing deleted
mail.listingDeleted.emailTitle=Listing deleted
mail.listingDeleted.subject=Your listing "{0}" has been succesfully deleted
mail.listingDeleted.intro=We inform you that your listing "{0}" has been deleted.
mail.listingDeleted.listingDetails=Listing details
mail.listingDeleted.pricePerDay=Price per day:
mail.listingDeleted.viewListing=View my listings

# Rider — return vehicle (reminder before checkout)
mail.riderReturnReminder.subject=Reminder: return the vehicle soon
mail.riderReturnReminder.emailTitle=Return the vehicle
mail.riderReturnReminder.intro=In a short time your rental period ends. Please plan to return the vehicle on time and coordinate with the owner if needed.
mail.riderReturnReminder.vehicle=Vehicle
mail.riderReturnReminder.ownerEmail=Host email
mail.riderReturnReminder.checkout=Checkout (return)
mail.riderReturnReminder.location=Return location
mail.riderReturnReminder.viewReservation=View reservation

# Rider — return at checkout if not marked returned
mail.riderReturnCheckout.subject=It is time to return the vehicle
mail.riderReturnCheckout.emailTitle=Return the vehicle now
mail.riderReturnCheckout.intro=The checkout time for your reservation has been reached. If you have not returned the vehicle yet, please do so as soon as possible and contact the host.
mail.riderReturnCheckout.viewReservation=View reservation

# Rider — optional review after rental
mail.riderReviewInvite.subject=You can leave a review for your rental
mail.riderReviewInvite.emailTitle=Leave a review
mail.riderReviewInvite.intro=Your rental for {0} has ended. You can leave an optional review about the host and the listing.
mail.riderReviewInvite.cta=Leave review

# Owner — rider uploaded payment receipt (pending review)
mail.paymentProofSubmittedOwner.subject=Payment receipt uploaded — {0}
mail.paymentProofSubmittedOwner.emailTitle=Review payment receipt
mail.paymentProofSubmittedOwner.intro={0} uploaded a payment receipt for {1}. Sign in to Ryden as the host, open My reservations, and approve or reject the payment.
mail.paymentProofSubmittedOwner.actionHint=In the reservation detail you can download the file and mark whether the payment is correct.
mail.paymentProofSubmittedOwner.cta=Review reservation