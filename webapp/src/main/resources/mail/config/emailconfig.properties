# SMTP (JavaMailSender). Set mail.server.password in application-local.properties or application-deployed.properties
# (see application-local.properties.example / application-deployed.properties.example). Never put secrets in this file.
mail.server.host=smtp.gmail.com
mail.server.port=587
mail.server.protocol=smtp
mail.server.username=paw.ryden@gmail.com

# Mails from-address (URL base: mail.app.base.url in application/*.properties)
mail.from.address=paw.ryden@gmail.com

# Classpath location of extra JavaMail settings (auth, TLS, etc.)
mail.javamail.config.location=classpath:mail/config/javamail.properties

# Email templates and copy (Thymeleaf + MessageSource; HTML/messages JAR: services)
mail.template.encoding=UTF-8
mail.messages.basename=mail/messages/MailMessages
mail.templates.prefix=mail/
mail.templates.suffix.text=.txt
mail.templates.suffix.html=.html
mail.templates.pattern.text=text/*
mail.templates.pattern.html=html/*
mail.templates.string.mode=HTML
