# Shared, non-secret defaults. Environment + credentials (JDBC, mail password, remember-me, mail base URL):
# copy application-local.properties.example or application-deployed.properties.example to the matching name
# (gitignored). Default profile is NOT "local": use production file unless you pass -Dspring.profiles.active=local.
server.port=8080
server.servlet.context-path=/webapp

# Upload limits: binary megabytes (MiB) × bytes-per-binary-megabyte (default 1024² = 1 MiB)
app.upload.bytes-per-binary-megabyte=1048576
app.upload.max-image-megabytes=20
app.upload.max-payment-receipt-megabytes=5
app.upload.max-profile-document-megabytes=5
app.upload.max-multipart-request-megabytes=180

# Listing: minimum hours between check-in and check-out (same calendar day)
app.listing.min-hours-between-checkin-checkout=6
# Max wall-calendar offset from "today" for published availability end dates (listing wall zone)
app.listing.max-availability-forward-wall-days=365

# User / profile validation (bound into UserValidationPolicy in services.policy)
app.validation.registration-password-min-length=8
app.validation.registration-password-max-length=72
app.validation.registration-email-max-length=50
app.validation.display-name-part-max-length=50
app.validation.profile-phone-max-length=20
app.validation.profile-about-max-length=500
app.validation.profile-phone-pattern=^[0-9+]+$
# Listing/reservation review comment (ReviewValidationPolicy in services.policy)
app.validation.review-comment-max-length=200

# Pagination: MVC listing grids / default card pages (controllers + search criteria in ListingServiceImpl)
app.pagination.default-page-size=8
# Listing detail (car-detail): public reviews list page size
app.pagination.listing-public-reviews-page-size=5

# Reservation: minimum pickup lead time (h) and deadline to upload payment proof in pending state (h)
app.reservation.pickup-lead-hours=24
app.reservation.payment-proof-deadline-hours=12
app.reservation.return-reminder-hours-before-checkout=2
# Max billable days for a single reservation (inclusive, listing wall calendar)
app.reservation.max-billable-days=30

# Scheduled task: active/paused listings without bookable wall day → finished (cron Spring 6 fields; IANA zone)
app.scheduler.listing-exhaustion.cron=0 0 4 * * *
app.scheduler.listing-exhaustion.zone=America/Argentina/Buenos_Aires

# Cancel reservations stuck in pending (no receipt yet) after payment proof deadline (Spring cron, 6 fields)
app.scheduler.payment-proof.cron=0 0/15 * * * ?

# Return-car emails + rider review invite (Spring cron, 6 fields; IANA zone)
app.scheduler.return-emails.zone=America/Argentina/Buenos_Aires
app.scheduler.return-emails.reminder-cron=0 0/10 * * * ?
app.scheduler.return-emails.checkout-cron=0 0/10 * * * ?
app.scheduler.return-emails.review-invite-cron=0 0/10 * * * ?

# Logging: classpath logback.xml + logback/ (file appenders, no DEBUG; never use System.out in Java).
# Directory for paw-*.log: JVM -DLOG_DIR=/path (default: logs/; rolling archives in logs/archive/).
# Local with console: -Dlogback.configurationFile=classpath:logback/logback-local.xml (mvn jetty:run in webapp/pom.xml).
