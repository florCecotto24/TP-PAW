# Shared, non-secret defaults. Environment + credentials (JDBC, mail password, remember-me, mail base URL):
# copy application-local.properties.example or application-deployed.properties.example to the matching name
# (gitignored). Default profile is NOT "local": use production file unless you pass -Dspring.profiles.active=local.
server.port=8080
server.servlet.context-path=/

# Support contact: surfaced to users in error messages, blocked-account hints, etc.
# Centralised here so the same address appears everywhere; override per environment if needed.
app.support.email=paw.ryden@gmail.com

# Upload limits: binary megabytes (MiB) × bytes-per-binary-megabyte (default 1024² = 1 MiB)
app.upload.bytes-per-binary-megabyte=1048576
app.upload.max-image-megabytes=20
app.upload.max-car-gallery-video-megabytes=25
app.upload.max-payment-receipt-megabytes=5
app.upload.max-profile-document-megabytes=5
app.upload.max-multipart-request-megabytes=225

# Car: minimum hours between check-in and check-out (same calendar day)
app.listing.min-hours-between-checkin-checkout=6
# Max wall-calendar offset from "today" for published availability end dates (listing wall zone)
app.listing.max-availability-forward-wall-days=365

# User / profile validation (bound into UserValidationPolicy in services.policy)
app.validation.registration-password-min-length=8
app.validation.registration-password-max-length=72
app.validation.registration-email-max-length=50
app.validation.display-name-part-max-length=50
app.validation.profile-phone-max-length=20
app.validation.profile-about-max-length=500
app.validation.profile-phone-pattern=^[0-9+]+$
# Car/reservation review comment (ReviewValidationPolicy in services.policy)
app.validation.review-comment-max-length=200
app.validation.reservation-message-max-length=1000

# Car publishing form (CarValidationPolicy in services.policy). Brand/model/plate also drive HTML maxlength.
app.validation.car-brand-min-length=2
app.validation.car-brand-max-length=50
app.validation.car-model-max-length=50
app.validation.car-plate-min-length=6
app.validation.car-plate-max-length=10
app.validation.car-description-max-length=200
app.validation.car-year-min=1886

# Listing creation/edit form (ListingFormValidationPolicy in services.policy)
app.validation.listing-address-street-max-length=250
app.validation.listing-address-number-max-length=10
app.validation.listing-availability-rows-min=1
app.validation.listing-availability-rows-max=10
app.validation.listing-minimum-rental-days-max=365

# Reservation form fields surfaced by hidden/visible inputs (ReservationFormValidationPolicy)
app.validation.reservation-delivery-location-max-length=250
app.validation.reservation-car-name-max-length=120
app.validation.reservation-datetime-input-max-length=40

# Verification / forgot-password numeric code (VerificationCodePolicy). Pattern is derived as [0-9]{N}.
app.validation.verification-code-length=6

# Reservation chat (owner/rider)
app.reservation.chat.history-page-size=50
app.reservation.chat.grace-days-after-finished=7
app.upload.max-chat-attachment-megabytes=25

# Presentation: teaser/snippet caps (PresentationLimitsPolicy)
app.presentation.counterparty-recent-reviews-limit=3
app.presentation.car-detail-similar-listings-limit=4
# Counterparty profile: “other active listings” initial page + each “view more” batch
app.presentation.counterparty-owner-active-listings-page-size=3

# Pagination: home + /search use DB fetch window then UI pages (e.g. 24 rows per query, 8 per page).
# JVM fallbacks (if a key is missing) must match ar.edu.itba.paw.models.pagination.PaginationFallbackSizes.
app.pagination.ui-page-size=8
app.pagination.db-fetch-size=24
# Owner listings, reservations, and similar grids: single SQL LIMIT / UI page size (PaginationPolicy#getDefaultPageSize)
app.pagination.default-page-size=8
# Car-detail public reviews (PaginationPolicy#getCarPublicReviewsPageSize). 6 aligns with db-fetch-size=24 (4 UI pages per window).
app.pagination.listing-public-reviews-page-size=6

# Reservation: minimum pickup lead time (h) and deadline to upload payment proof in pending state (h)
app.reservation.pickup-lead-hours=24
app.reservation.payment-proof-deadline-hours=12
# Rider reminder email: send when payment_proof_deadline_at is within this many hours from "now" (DAO + mail intro must match)
app.reservation.payment-proof-reminder-lead-hours=2
app.reservation.return-reminder-hours-before-checkout=2
# Max billable days for a single reservation (inclusive, listing wall calendar)
app.reservation.max-billable-days=30
# Reviews: window (days) after which a stale rider/owner review is auto-skipped. Rider window starts at
# reservation endDate; owner window starts at the moment the owner marked the car returned. Set to 0 to disable.
app.reservation.review-auto-skip-days=15

# Default IANA timezone for every @Scheduled cron expression (single source of truth).
# Per-scheduler overrides can be re-introduced as app.scheduler.<name>.zone=... if ever needed;
# each scheduler's @Scheduled placeholder falls back to this value when absent.
app.scheduler.default-zone=America/Argentina/Buenos_Aires

# Scheduled task: active/paused listings without bookable wall day → finished (cron Spring 6 fields)
app.scheduler.listing-exhaustion.cron=0 0 4 * * *

# Cancel reservations stuck in pending (no receipt yet) after payment proof deadline (Spring cron, 6 fields)
app.scheduler.payment-proof.cron=0 0/15 * * * ?

# Day-before pickup reminder emails (Spring cron, 6 fields)
app.scheduler.reservation-reminder.cron=0 0 9 * * ?

# Payment proof deadline reminder emails to riders (Spring cron, 6 fields)
app.scheduler.payment-proof-reminder.cron=0 0/10 * * * ?
app.scheduler.refund-proof-reminder.cron=0 0/10 * * * ?
app.scheduler.refund-proof-overdue-sweep.cron=0 5/15 * * * ?

# Return-car emails + rider review invite (Spring cron, 6 fields)
app.scheduler.return-emails.reminder-cron=0 0/10 * * * ?
app.scheduler.return-emails.checkout-cron=0 0/10 * * * ?
app.scheduler.return-emails.review-invite-cron=0 0/10 * * * ?
# Auto-skip stale reviews (rider: 15 d after endDate; owner: 15 d after car returned). Spring cron, 6 fields.
app.scheduler.return-emails.review-auto-skip-cron=0 0/30 * * * ?

# Reservation chat digest emails (Spring cron, 6 fields: every minute at second 0)
app.scheduler.chat-digest.cron=0 * * * * ?

# Logging: classpath logback.xml + logback/ (file appenders, no DEBUG; never use System.out in Java).
# Production (pampero): -DLOG_DIR=... must be the directory exposed as http://pawserver.it.itba.edu.ar/logs/ so files
#   paw-2026a-08-webapp-info|warn|error|platform-warn|platform-error.yyyy-MM-dd.log (override basename with -DDEPLOY_LOG_BASENAME=...).
# Default: logs/ under cwd. Local with console: -Dlogback.configurationFile=classpath:logback/logback-local.xml (mvn jetty:run).
