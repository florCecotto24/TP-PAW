openapi: 3.0.3

##############################################################################
# Ryden REST API — PAW 2026a-08
#
# Diseñado siguiendo LINEAMIENTOS-SPA-REST.md (cátedra purista REST).
#
# NOTA DE DISEÑO IMPORTANTE (ver PROPUESTA-TP3.md §4, decisión D1):
#   En el código REAL no existe una entidad `Listing` ni `ListingUnpauseRequest`.
#   Una "publicación" = un `Car` + sus filas `CarAvailability`. El estado de
#   publicación (active/paused/admin_paused/...) vive en `Car.status`.
#   Por eso NO hay recurso /listings ni /unpause-requests: el pausar/despausar
#   es una transición de estado sobre /cars/{id} (PATCH).
#
# Convenciones transversales (aplican a TODAS las operaciones, no se repiten
# en cada una para no inflar el spec):
#   - Versionado y formato por MIME type propio (Accept / Content-Type):
#       application/vnd.paw.<entidad>.v1+json
#     NUNCA application/json genérico.
#   - Autenticación stateless por header Authorization (Basic para "loguear",
#     Bearer para el resto). NO hay /login, /register, /refresh. Ver
#     securitySchemes y PROPUESTA-TP3.md §2.
#   - Tras autenticar con Basic o renovar con un Refresh token, el server
#     agrega a CUALQUIER respuesta los headers `X-Access-Token`,
#     `X-Refresh-Token` y un Link rel="authenticated-user" con la URN del
#     usuario logueado (sustituto canónico de /me, ver decisión D2).
#   - Paginación SIEMPRE por header `Link` (rel first/prev/next/last),
#     honrando los query params de filtro. El body es solo la lista de
#     entidades, nunca {content,page,totalPages}.
#   - Toda representación trae un bloque `links` con `self` + relacionados.
#     Los links se generan on-the-fly con UriInfo; nunca se persisten.
#   - Colecciones: dos patrones documentados (ver info.description y AGENTS.md
#     § Hypermedia collections):
#       (A) link-only — colección de otros recursos canónicos (similar,
#           favoritos, reviews, reservations): body = array de Links; el
#           cliente hace follow de cada self (N+1 HTTP intencional).
#       (B) embedded — colección principal, sub-recurso o valor sin URN
#           propia (GET /cars browse, pictures, availabilities, messages,
#           bookable-segments, catálogo): body = DTOs con links.self en
#           cada ítem hacia la URN canónica del miembro.
##############################################################################

info:
  title: Ryden REST API
  version: "1.0"
  description: >
    API REST (Jersey/JAX-RS) de Ryden — plataforma P2P de alquiler de autos.
    Reemplaza la capa Spring MVC + JSP. Consumida por una SPA servida como
    estáticos desde Tomcat (sin SSR). Esta especificación es el contrato
    público (DTOs), independiente del modelo de dominio.

    ## Colecciones: link-only vs embedded (decisión de diseño REST)

    Alineado con lineamientos de la cátedra (ver AGENTS.md):
    (no embeber *otros* recursos en el padre; navegar URNs, no IDs sueltos).

    **Link-only (patrón A)** — la colección lista *referencias* a recursos que
    ya tienen URN canónica en otro path. Body: `array` de `Links` (`self` only).
    El cliente sigue cada `self` con el MIME del ítem. N+1 HTTP **previsto**.
    Endpoints: `/cars/{id}/similar`, `/users/{id}/favorites`, `GET /reviews`,
    `GET /reservations`.

    **Embedded (patrón B)** — permitido cuando (1) la colección *es* la vista
    principal de ese recurso o sub-recurso, (2) los ítems no son copias de
    otro agregado sino miembros de *esta* colección, y (3) cada ítem incluye
    `links.self` hacia su URN canónica. Endpoints: `GET /cars` (browse),
    `/cars/{id}/pictures`, `/cars/{id}/availabilities`,
    `/reservations/{id}/messages`, `/cars/{id}/bookable-segments` (valores
    calculados sin URN), catálogo (`/brands`, `/neighborhoods`, …).

    Detalle operativo: `AGENTS.md` § Hypermedia collections.

servers:
  - url: /webapp/api
    description: >
      API bajo el context path local (Jetty / `webapp.war` → `/webapp`).
      La SPA vive en /webapp/; los recursos REST en /webapp/api/.
  - url: /paw-2026a-08/api
    description: >
      API en Pampero (`http://pawserver.it.itba.edu.ar/paw-2026a-08/api`).
      Empaquetar la SPA con `npm run build:pampero` (Vite base `/paw-2026a-08/`).
  - url: /api
    description: >
      API sin context path (contenedor montado en `/`).
      Ajustar el prefijo al probar según el entorno.

tags:
  - name: index
    description: Descriptor de la API (clientes genéricos)
  - name: users
    description: Usuarios (registro, perfil, verificación de email, rol, bloqueo)
  - name: credentials
    description: Códigos de verificación de email y de reseteo de password (entidades débiles que actúan como credencial)
  - name: cars
    description: Autos y su publicación (status, disponibilidad, galería)
  - name: reservations
    description: Reservas y su ciclo de vida
  - name: reviews
    description: Reseñas post-reserva
  - name: catalog
    description: Catálogo de marcas y modelos (con aprobación admin)
  - name: locations
    description: Catálogo de barrios
  - name: files
    description: Binarios (imágenes, documentos, comprobantes, adjuntos)
  - name: meta
    description: Configuración pública para el SPA (límites de validación/upload)

#############################################################################
# SECURITY
#############################################################################
security:
  - bearerAuth: []

paths:

  #############################################################################
  # ÍNDICE
  #############################################################################
  /:
    get:
      tags: [index]
      summary: Descriptor de la API (opcional, §1.10)
      description: >
        Devuelve los recursos top-level y los query params que aceptan, para
        clientes genéricos / crawlers. También es un buen endpoint "neutro"
        para autenticar con Basic (login) o renovar con Refresh: la respuesta
        traerá los tokens en headers y el Link rel="authenticated-user".
      security:
        - {}
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Descriptor de la API.
          headers:
            X-Access-Token: { $ref: "#/components/headers/X-Access-Token" }
            X-Refresh-Token: { $ref: "#/components/headers/X-Refresh-Token" }
            Link: { $ref: "#/components/headers/Link-AuthenticatedUser" }
          content:
            application/vnd.paw.api.v1+json:
              schema: { $ref: "#/components/schemas/ApiIndex" }

  /config:
    get:
      tags: [meta]
      summary: Límites públicos para validación del SPA
      description: >
        Expone límites de validación y subida alineados con `application.properties`
        (CBU, días facturables máximos, publicación de autos, uploads). El cliente
        puede usar estos valores en lugar de constantes hardcodeadas; si el GET falla,
        el SPA conserva fallbacks documentados.
      security: []
      responses:
        "200":
          description: Límites de cliente.
          content:
            application/vnd.paw.config.v1+json:
              schema: { $ref: "#/components/schemas/ClientConfig" }

  #############################################################################
  # USERS
  #############################################################################
  /users:
    get:
      tags: [users]
      summary: Listar usuarios (admin) — colección paginada y filtrable
      description: >
        Solo admin. Filtros y paginación por query params; la paginación se
        devuelve en el header `Link` (NO en el body).
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: blocked
          in: query
          schema: { type: boolean }
          description: Filtra por estado de bloqueo.
        - name: role
          in: query
          schema: { type: string, enum: [user, admin] }
        - name: q
          in: query
          schema: { type: string }
          description: >
            Búsqueda parcial (case-insensitive) por email, nombre, apellido o
            nombre completo. Solo admin.
      responses:
        "200":
          description: Lista de usuarios (vista privada admin).
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.user.private.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserPrivateDto" }
        "204": { description: Colección vacía. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [users]
      summary: Registrar usuario (reemplaza POST /register), o provisionar un admin
      description: >
        Mismo endpoint de colección, dos variantes discriminadas por Content-Type:
        - `application/vnd.paw.user.v1+json` (anónimo): "registrarse" = crear el
          recurso usuario. NO existe /register. Queda con emailVerified=false y
          dispara un OTP por email. Reenviar OTP: seguir `links.credentials` del
          UserDto (201) hacia POST /users/{id}/credentials — no inventar el path.
          Verificar: Basic auth email:otp (ver securitySchemes.basicAuth).
        - `application/vnd.paw.admincreateuser.v1+json` (solo admin, Bearer): crea
          una cuenta ya pre-verificada con `role=admin`; dispara un email de
          invitación y un OTP de set-password (mismo flujo que forgot-password).
          La contraseña nunca viaja en claro por mail.
      requestBody:
        required: true
        content:
          application/vnd.paw.user.v1+json:
            schema: { $ref: "#/components/schemas/UserCreateDto" }
          application/vnd.paw.admincreateuser.v1+json:
            schema: { $ref: "#/components/schemas/AdminCreateUserDto" }
      responses:
        "201":
          description: Usuario creado.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.user.v1+json:
              schema: { $ref: "#/components/schemas/UserDto" }
            application/vnd.paw.user.private.v1+json:
              schema: { $ref: "#/components/schemas/UserPrivateDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Email ya registrado (EmailAlreadyExistsException).
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }
    delete:
      tags: [users]
      summary: No permitido sobre la colección
      responses:
        "405": { $ref: "#/components/responses/MethodNotAllowed" }

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [users]
      summary: Obtener un usuario (perfil público o privado)
      description: >
        URN canónica del usuario. La representación depende del header Accept
        (dos schemas fijos, no recorte por permisos):
        - `application/vnd.paw.user.v1+json` — perfil público (sin email, CBU, teléfono, role, blocked).
        - `application/vnd.paw.user.private.v1+json` — vista self/admin (403 si no autorizado).
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
            example: application/vnd.paw.user.v1+json
      security: []
      responses:
        "200":
          description: Usuario.
          content:
            application/vnd.paw.user.v1+json:
              schema: { $ref: "#/components/schemas/UserDto" }
            application/vnd.paw.user.private.v1+json:
              schema: { $ref: "#/components/schemas/UserPrivateDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [users]
      summary: Actualización parcial / transiciones de estado del usuario
      description: >
        Un único endpoint PATCH absorbe TODAS las "acciones" del MVC viejo
        que eran cambios de estado sobre el usuario. El cuerpo solo lleva los
        atributos a cambiar; el resource autoriza según quién sea el llamante:

        - Actualizar perfil (nombre, teléfono, fecha nac., about, cbu, locale): self (Bearer).
        - Cambiar password (logueado) → { "password": "...", "currentPassword": "..." }.
        - Resetear password olvidado → { "password": "...", "passwordConfirm": "..." }
          autenticado con Basic email:resetOtp (authority ROLE_PASSWORD_RESET_OTP).
          El OTP se consume al completar el reset (decisión D4).
        - Promover/degradar admin → { "role": "admin" | "user" } (solo admin).
        - Bloquear/desbloquear → { "blocked": true | false } (solo admin).
        - Validar documentos/identidad → { "identityValidated": true } (solo admin).

        La verificación de email NO usa PATCH: el OTP se presenta como
        Basic email:otp en cualquier request autenticado (p. ej. login);
        el backend consume el código y marca emailVerified (decisión D3).

        Reglas de negocio (no auto-bloqueo, no bloquear al grantor, etc.) se
        mapean a 403 vía ExceptionMapper.
      requestBody:
        required: true
        content:
          application/vnd.paw.user.v1+json:
            schema: { $ref: "#/components/schemas/UserPatchDto" }
      responses:
        "200":
          description: Usuario actualizado.
          content:
            application/vnd.paw.user.v1+json:
              schema: { $ref: "#/components/schemas/UserDto" }
            application/vnd.paw.user.private.v1+json:
              schema: { $ref: "#/components/schemas/UserPrivateDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [users]
      summary: Eliminar usuario (self/admin)
      responses:
        "204": { description: Eliminado. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Imagen de perfil (sub-recurso binario débil) ---
  /users/{id}/profile-picture:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [users, files]
      summary: Foto de perfil (binario público)
      security: []
      responses:
        "200": { $ref: "#/components/responses/BinaryImage" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [users, files]
      summary: Subir/reemplazar foto de perfil (self)
      requestBody:
        required: true
        content:
          image/*:
            schema: { type: string, format: binary }
      responses:
        "204": { description: Subida. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [users, files]
      summary: Borrar foto de perfil (self)
      responses:
        "204": { description: Borrada. }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- Documentos de perfil (licencia / identidad) ---
  /users/{id}/documents/{documentType}:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: documentType
        in: path
        required: true
        schema: { type: string, enum: [license, identity] }
    get:
      tags: [users, files]
      summary: Descargar documento de perfil (self/admin)
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [users, files]
      summary: Subir/reemplazar un documento (self)
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "204": { description: Subido. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [users, files]
      summary: Borrar un documento (self)
      responses:
        "204": { description: Borrado. }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- Favoritos (entidad débil FavCar; colección privada del usuario) ---
  /users/{id}/favorites:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [users]
      summary: Autos favoritos del usuario (self) — colección paginada
      description: >
        Colección paginada de links a autos favoritos. Cada ítem expone solo `self`;
        seguir con `Accept: application/vnd.paw.car.summary.v1+json` para el teaser.
        **Patrón A (link-only):** los miembros son autos cuya URN canónica es
        `GET /cars/{id}`; no se embeben teasers en la colección del usuario.
        N+1 HTTP previsto (ver `GET /cars/{id}/similar` y `AGENTS.md`).
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Lista de autos favoritos.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.user.favorites.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Links" }
        "204": { description: Sin favoritos. }
        "403": { $ref: "#/components/responses/Forbidden" }

  /users/{id}/favorites/{carId}:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: carId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [users]
      summary: Comprobar membresía en favoritos (self, sin mutación)
      description: >
        Membresía canónica de la entidad débil FavCar. Descubrir la URN expandiendo
        `user.links.favorites-item-template` (RFC 6570 `{carId}`) con el último segmento
        de `car.links.self` — no concatenar `{favorites}/{carId}` a mano.
        204 cuando el auto está en favoritos; 404 cuando no lo está o el auto no existe.
      responses:
        "204": { description: Es favorito. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [users]
      summary: Marcar un auto como favorito (idempotente)
      description: >
        Reemplaza el "toggle" del MVC por operaciones idempotentes:
        PUT agrega (favoritear), DELETE quita. El cliente ya sabe el estado.
      responses:
        "204": { description: Favorito agregado (o ya existía). }
        "403":
          description: No se puede favoritear el auto propio.
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [users]
      summary: Quitar de favoritos (idempotente)
      responses:
        "204": { description: Quitado (o no estaba). }
        "403": { $ref: "#/components/responses/Forbidden" }

  #############################################################################
  # CREDENCIALES (OTP temporales) — sub-recursos sin verbos en la URL
  #############################################################################
  /users/{id}/credentials:
    parameters:
      - $ref: "#/components/parameters/idPath"
    post:
      tags: [credentials, users]
      summary: Reemitir OTP de verificación de email
      description: >
        Tras POST /users el servidor envía un OTP por mail. Este endpoint
        reemite el código si aplica (200 OK con cuerpo vacío, siempre uniforme).
        Descubrir la URN vía `links.credentials` del user no verificado (no hardcodear
        el path). La verificación en sí es Basic auth email:otp — el OTP actúa como
        password, se consume al autenticar y devuelve JWT en headers (D3).
        Anti-enumeración: la respuesta es indistinguible si el usuario no existe,
        ya está verificado, ya tiene un código activo, o se excedió el cupo de emisión.

        **Rate limit:** la *emisión* (este POST) aplica cupo por email
        (`OtpAttemptLimiter` key space `issue:…`, misma tabla `otp_attempt_windows`).
        Sobre cupo → 200 silencioso (anti-enumeración). El *intento de verificación*
        (Basic OTP) sí está rate-limited por fallos y responde 429 `otp_rate_limited`.
      security:
        - {}
      responses:
        "200":
          description: Respuesta uniforme (OTP emitido solo cuando aplica).

  /credentials:
    post:
      tags: [credentials]
      summary: Solicitar OTP de reseteo de password
      description: >
        Body con email. SIEMPRE responde 200 con cuerpo vacío (anti-enumeración). El OTP se
        envía por email y actúa como password en Basic auth para completar
        el reset vía PATCH /users/{id} con password + passwordConfirm (D4).
        No hay URLs con verbos (/forgot-password, /reset, /verify, etc.).

        **Rate limit (S7):** la *solicitud* de OTP (este POST) no tiene rate limit
        por IP/email a propósito (anti-enumeración + uniformidad 200). El abuso de
        reenvío se mitiga con el coste de entrega del mail. Los *intentos fallidos*
        de usar el OTP en Basic auth sí están limitados (`OtpAttemptLimiter`) y
        responden 429 `otp_rate_limited`.
      security:
        - {}
      requestBody:
        required: true
        content:
          application/vnd.paw.credential.v1+json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        "200":
          description: Respuesta uniforme (OTP emitido solo si la cuenta existe y aplica).

  # --- Reviews canónicas ---
  /reviews:
    get:
      tags: [reviews]
      summary: Listar reseñas (colección canónica)
      description: >
        Requiere exactamente un filtro de ámbito: `carId` (públicas del auto),
        `recipientUserId` (recibidas por el usuario en su perfil) o
        `reservationId` (reseñas de esa reserva; 0–2 ítems, sin paginación).
        Esos filtros de colección se publican ya completos en `links.reviews`
        del auto, usuario o reserva padre; el cliente sigue el link y no extrae
        ids de una URN para reconstruir la query.
        Visibilidad por ítem: las reseñas que el llamante no puede ver se omiten
        de la colección (no se responde 403). Un GET a `/reviews/{id}` sí responde
        403 si el ítem no es visible.

        **Patrón A (link-only):** cada reseña vive en `GET /reviews/{reviewId}`.
        La colección filtrada devuelve solo `Links`; follow con `review.v1+json`.
      parameters:
        - name: carId
          in: query
          schema: { type: integer, format: int64 }
        - name: recipientUserId
          in: query
          schema: { type: integer, format: int64 }
        - name: reservationId
          in: query
          schema: { type: integer, format: int64 }
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeReviews"
      security: []
      responses:
        "200":
          description: Links a reseñas visibles.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.review.links.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Links" }
        "204": { description: Colección vacía (o sin ítems visibles para el llamante). }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [reviews, reservations]
      summary: Dejar una reseña (rider→owner u owner→rider)
      description: >
        Misma URI de colección que el GET. La reserva se referencia mediante
        `reservationUri` en el body multipart, nunca mediante un id suelto.
        El lado (made_by_rider) se deriva del rol del llamante en la reserva.
        Solo si la reserva está FINISHED y no existe ya una reseña de ese lado
        (UNIQUE(reservation_id, made_by_rider)).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [reservationUri]
              properties:
                reservationUri:
                  type: string
                  format: uri
                  description: URN canónica de la reserva (`links.self`).
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
                image: { type: string, format: binary }
            encoding:
              image: { contentType: image/* }
      responses:
        "201":
          description: Reseña creada.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.review.v1+json:
              schema: { $ref: "#/components/schemas/ReviewDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Ya existe reseña de ese lado, o la reserva no está FINISHED.

  /reviews/{reviewId}:
    parameters:
      - name: reviewId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [reviews]
      summary: Reseña individual por id (URN canónica)
      security: []
      responses:
        "200":
          description: La reseña.
          content:
            application/vnd.paw.review.v1+json:
              schema: { $ref: "#/components/schemas/ReviewDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  #############################################################################
  # CARS  (incluye lo que el MVC llamaba "publicación")
  #############################################################################
  /cars:
    get:
      tags: [cars]
      summary: Buscar / listar autos (reemplaza /search, home, /my-cars, /admin/cars)
      description: >
        Una sola colección con TODOS los filtros como query params. Las
        distintas pantallas del MVC (home cheapest/recent, búsqueda pública,
        "mis autos", listado admin) colapsan acá variando query params +
        autorización. Paginación por header `Link`. Semántica según query
        (decisión documentada, ver auditoría A14): (1) `status=all`, sin
        `ownerId` y con autenticación admin → TODO el catálogo; (2) `ownerId` →
        "autos de este usuario": si el llamante es ese
        usuario o admin, ve cualquier estado (o el filtro `status` explícito que
        mande); cualquier otro llamante ve solo `active` y no puede pasar
        `status` (403); (3) browse público → siempre `active` únicamente.
        `Accept` solo selecciona la representación (`car.summary` o `car`) y
        nunca modifica la membresía de la colección.

        **Representación embebida (patrón B):** esta URI es la colección
        *principal* de autos (browse, home, mis autos, admin). LINEAMIENTOS
        §1.6: el body es la lista de autos (teasers `CarSummaryDto` o `CarDto`),
        no links sueltos. Cada ítem trae `links.self` → `GET /cars/{id}`; no
        duplica el recurso en otra URN. Distinto de favoritos/similares (patrón A).
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeBrowse"
        - name: Accept
          in: header
          schema:
            type: string
            example: application/vnd.paw.car.summary.v1+json
          description: >
            Selecciona `car.summary.v1+json` (teaser), `car.v1+json` o
            `car.private.v1+json` (catálogo admin con patente); no cambia
            filtros ni membresía. El catálogo admin se solicita con `status=all`.
        - name: q
          in: query
          schema: { type: string }
          description: Texto libre (marca/modelo/descripción).
        - name: ownerId
          in: query
          schema: { type: integer, format: int64 }
          description: Filtra por dueño (sustituye "/my-cars" pasando el propio id).
        - name: category
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/CarType" } }
          description: Repetible (`category=suv&category=sedan`) para filtrar por varias categorías a la vez.
        - name: transmission
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/Transmission" } }
          description: Repetible, igual que `category`.
        - name: powertrain
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/Powertrain" } }
          description: Repetible, igual que `category`.
        - name: priceMin
          in: query
          schema: { type: number }
        - name: priceMax
          in: query
          schema: { type: number }
        - name: priceMarket
          in: query
          schema: { type: string, enum: [below_market, at_market, above_market] }
          description: >
            Filtra autos según su posición de precio respecto al promedio de mercado del mismo
            marca/modelo (mismas bandas que los badges de las cards: ≤90% below, ≤110% at,
            >110% above; requiere al menos 2 comparables).
        - name: rating
          in: query
          style: form
          explode: true
          schema: { type: array, items: { type: number, minimum: 0, maximum: 5 } }
          description: Repetible; cada valor es un piso de calificación mínima (p.ej. `rating=4&rating=5`).
        - name: neighborhoodId
          in: query
          schema: { type: integer, format: int64 }
        - name: from
          in: query
          schema: { type: string, format: date }
          description: Inicio de la ventana de disponibilidad (wall date).
        - name: until
          in: query
          schema: { type: string, format: date }
        - name: flexible
          in: query
          schema: { type: boolean, default: false }
          description: Activa búsqueda por ventana flexible; ignora `from`/`until`.
        - name: flexMonth
          in: query
          schema: { type: string, pattern: '^\d{4}-\d{2}$' }
          description: Mes de búsqueda flexible. Requerido cuando `flexible=true`.
        - name: flexDays
          in: query
          schema: { type: integer, minimum: 1, nullable: true }
          description: Duración deseada dentro de `flexMonth`; omitido significa cualquier duración válida.
        - name: status
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              oneOf:
                - $ref: "#/components/schemas/CarStatus"
                - type: string
                  enum: [all]
          description: >
            Repetible. Filtro por estado. Solo el dueño (vía ownerId propio) o un admin pueden
            filtrar por estados no públicos. El valor especial único `all`, sin `ownerId`,
            selecciona el catálogo completo y requiere admin.
        - name: sort
          in: query
          schema: { type: string, enum: [price_asc, price_desc, rating_desc, recent, name] }
          description: >
            `name` ordena por marca+modelo (asc). `recent` es createdAt desc.
            Tokens desconocidos caen al default `recent`.
      security: []
      responses:
        "403":
          description: >
            `status=all` sin ser admin, o status explícito en ownerId de otro usuario sin ser admin.
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }
        "200":
          description: Lista de autos.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.car.summary.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CarSummaryDto" }
            application/vnd.paw.car.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CarDto" }
            application/vnd.paw.car.private.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CarPrivateDto" }
        "204": { description: Sin resultados. }
    post:
      tags: [cars]
      summary: Publicar un auto (reemplaza POST /publish-car)
      description: >
        Crea el Car. Según prerequisitos (identidad+cbu) y si la marca/modelo
        está validada, el server fija el `status` inicial (active / lack_doc) y
        si el modelo quedó pendiente lo indica en la representación. La galería
        y el seguro se suben luego como sub-recursos (PUT /cars/{id}/pictures,
        PUT /cars/{id}/insurance) o en el mismo POST multipart.
      requestBody:
        required: true
        content:
          application/vnd.paw.car.v1+json:
            schema: { $ref: "#/components/schemas/CarCreateDto" }
          multipart/form-data:
            schema:
              type: object
              properties:
                car: { $ref: "#/components/schemas/CarCreateDto" }
                pictures:
                  type: array
                  items: { type: string, format: binary }
                insurance: { type: string, format: binary }
      responses:
        "201":
          description: Auto publicado.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.car.private.v1+json:
              schema: { $ref: "#/components/schemas/CarPrivateDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: No cumple prerequisitos (identidad/cbu) o plate duplicada.

  /cars/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars]
      summary: Detalle o teaser de un auto (misma URI, MIME distinto)
      description: >
        `Accept: application/vnd.paw.car.v1+json` → detalle público (`CarDto`, sin patente).
        `Accept: application/vnd.paw.car.private.v1+json` → detalle owner/admin (`CarPrivateDto`,
        con patente); 403 si no sos owner/admin.
        `Accept: application/vnd.paw.car.summary.v1+json` → teaser (`CarSummaryDto`).
        Sin Accept de summary/private explícito se responde el detalle público.
        Respuestas incluyen `ETag` derivado de `updatedAt` y el MIME negociado.
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
            example: application/vnd.paw.car.v1+json
          description: >
            `car.v1+json` (público), `car.private.v1+json` (owner/admin + plate) o
            `car.summary.v1+json` (teaser). Misma URN.
      security: []
      responses:
        "200":
          description: Auto.
          headers:
            ETag:
              description: Versión de la representación (`car-{id}-{summary|detail|private}-{updatedAtMillis}`).
              schema: { type: string }
            Vary:
              description: Negociación por `Accept`.
              schema: { type: string, example: Accept }
          content:
            application/vnd.paw.car.v1+json:
              schema: { $ref: "#/components/schemas/CarDto" }
            application/vnd.paw.car.private.v1+json:
              schema: { $ref: "#/components/schemas/CarPrivateDto" }
            application/vnd.paw.car.summary.v1+json:
              schema: { $ref: "#/components/schemas/CarSummaryDto" }
        "304":
          $ref: "#/components/responses/NotModified"
        "403":
          description: Se pidió `car.private` sin ser owner/admin.
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [cars]
      summary: Transiciones de estado y campos editables del auto
      description: >
        Absorbe las "acciones" del MVC sobre el auto vía atributos del body:
        - Owner pausa/despausa → { "status": "paused" | "active" }.
        - Admin pausa/despausa → { "status": "admin_paused" | "active" }
          (cancela reservas en cascada y notifica al owner).
        - Soft-delete / desactivación → solo `DELETE /cars/{id}` (PATCH
          `status: deactivated` responde 409).
        - Descripción / minimumRentalDays cuando vienen en el body.
        El resource valida transición permitida y permisos (owner vs admin).
      requestBody:
        required: true
        content:
          application/vnd.paw.car.v1+json:
            schema: { $ref: "#/components/schemas/CarPatchDto" }
      responses:
        "200":
          description: Auto actualizado.
          content:
            application/vnd.paw.car.private.v1+json:
              schema: { $ref: "#/components/schemas/CarPrivateDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >
            Transición no permitida desde el estado actual, o intento de
            desactivar vía PATCH (usar DELETE).
    delete:
      tags: [cars]
      summary: Desactivar (soft-delete) el auto (owner) — ver decisión D5
      responses:
        "204": { description: Desactivado. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /cars/{id}/similar:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars]
      summary: Autos similares (misma categoría, activos)
      description: >
        Colección de links a autos relacionados. La URN canónica se emite en
        `car.links.similar` (`/cars/{id}/similar`); no armar la URI a mano.
        Cada ítem expone solo `self`; seguir ese link con
        `Accept: application/vnd.paw.car.summary.v1+json` para el teaser.

        **N+1 HTTP previsto:** el cliente hace 1 GET a esta colección y luego un
        GET por cada `self`. Es un tradeoff deliberado para preservar REST puro
        (un auto = una URI canónica; la colección no embebe representaciones).
        No confundir con el anti-patrón de persistencia N+1 (ver `AGENTS.md`).
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20, default: 4 }
      security: []
      responses:
        "200":
          description: Links a autos similares (`self` → `GET /cars/{id}`).
          headers:
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.car.similar.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Links" }
        "204": { description: Sin similares. }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Disponibilidad: sub-recurso fuerte con identidad propia ---
  /cars/{id}/availabilities:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars]
      summary: Períodos de disponibilidad efectivos del auto
      description: >
        Devuelve las filas OFFERED efectivas (las que "ganan" por createdAt).
        Para el calendario del rider. Admite ?month=YYYY-MM para la vista mensual.

        **Representación embebida (patrón B):** sub-colección de
        `/cars/{id}/availabilities`; la lista *es* la vista de calendario y
        necesita fechas/precios en un round-trip. Las filas normales tienen
        `links.self` → `GET /cars/{id}/availabilities/{availabilityId}`; los
        segmentos calculados de la vista mensual no tienen `self`, porque no son
        recursos individuales dereferenciables.
      parameters:
        - name: month
          in: query
          schema: { type: string, pattern: '^\d{4}-\d{2}$' }
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeAvailabilities"
      security: []
      responses:
        "200":
          description: Períodos de disponibilidad.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.availability.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AvailabilityDto" }
        "204": { description: Colección vacía. }
    post:
      tags: [cars]
      summary: Crear un período de disponibilidad (owner)
      description: Inserta una fila OFFERED. Valida lead time, overlaps, horizonte.
      requestBody:
        required: true
        content:
          application/vnd.paw.availability.v1+json:
            schema: { $ref: "#/components/schemas/AvailabilityCreateDto" }
      responses:
        "201":
          description: Período creado.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.availability.v1+json:
              schema: { $ref: "#/components/schemas/AvailabilityDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [cars]
      summary: Retirar disponibilidad por rango de fechas (owner)
      description: >
        DELETE sobre la colección `/cars/{id}/availabilities` con query params
        `from` y `until` (wall-local `YYYY-MM-DD`). Inserta filas WITHDRAWN
        cubriendo el rango. Falla con 409 si hay reservas activas solapadas.
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: until
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "204": { description: Rango retirado. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Hay reservas activas que se solapan.

  /cars/{id}/availabilities/{availabilityId}:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: availabilityId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [cars]
      summary: Detalle de un período
      security: []
      responses:
        "200":
          description: Período.
          content:
            application/vnd.paw.availability.v1+json:
              schema: { $ref: "#/components/schemas/AvailabilityDto" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [cars]
      summary: Editar un período (owner)
      description: >
        Internamente inserta una fila OFFERED nueva + filas WITHDRAWN para los
        días retirados (layering por createdAt). El cliente lo ve como una
        edición sobre la misma URN.
      requestBody:
        required: true
        content:
          application/vnd.paw.availability.v1+json:
            schema: { $ref: "#/components/schemas/AvailabilityCreateDto" }
      responses:
        "200":
          description: Período editado.
          content:
            application/vnd.paw.availability.v1+json:
              schema: { $ref: "#/components/schemas/AvailabilityDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [cars]
      summary: Retirar un período (owner)
      description: Inserta una fila WITHDRAWN cubriendo el período. Falla si hay reservas activas que se solapan.
      responses:
        "204": { description: Retirado. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Hay reservas activas que se solapan (CarValidationException).

  # --- Galería del auto (sub-recurso débil) ---
  /cars/{id}/bookable-segments:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars]
      summary: Segmentos de días reservables para el selector de fechas del rider
      description: >
        Colección acotada por diseño (los tramos de disponibilidad efectiva ya
        publicados del auto desde "ahora"): sin paginación por page/pageSize,
        solo X-Total-Count con el tamaño de la lista devuelta.
        Los ítems son proyecciones calculadas (no recursos con URN propia); no
        aplica el patrón link-only de `/cars/{id}/similar`. **Patrón B
        (valor embebido):** segmentos derivados de disponibilidad efectiva;
        no existen como `GET /bookable-segments/{id}`.
      security: []
      responses:
        "200":
          description: Segmentos reservables.
          headers:
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.bookablesegment.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BookableSegmentDto" }
        "204": { description: Sin segmentos reservables. }
        "404": { $ref: "#/components/responses/NotFound" }

  /cars/{id}/pictures:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars, files]
      summary: Galería del auto (lista de metadatos hipervinculados)
      description: >
        **Representación embebida (patrón B):** metadatos de la galería
        (orden, `links.self`, bytes vía `links` relacionados). La colección
        bajo `/cars/{id}/pictures` es la entrada natural del sub-recurso;
        link-only obligaría N+1 solo para `displayOrder` en grids paginados.
        Cada ítem: `links.self` → `GET /cars/{id}/pictures/{pictureId}`.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizePictures"
      security: []
      responses:
        "200":
          description: Items de galería.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.picture.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PictureDto" }
        "204":
          description: Galería vacía.
    post:
      tags: [cars, files]
      summary: Agregar una imagen/video a la galería (owner)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: Item agregado (PictureDto + Location).
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.picture.v1+json:
              schema: { $ref: "#/components/schemas/PictureDto" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /cars/{id}/pictures/primary:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars, files]
      summary: Imagen/video principal de la galería (menor displayOrder)
      description: >
        URN estable para la portada del auto. Devuelve los bytes del primer item de la galería
        (misma semántica que `links.cover` en tarjetas cuando existe).
      security: []
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /cars/{id}/pictures/{pictureId}:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: pictureId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [cars, files]
      summary: Bytes de una imagen/video de la galería (público)
      security: []
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [cars, files]
      summary: Quitar item de la galería (owner)
      responses:
        "204": { description: Quitado. }
        "403": { $ref: "#/components/responses/Forbidden" }

  # --- Seguro del auto (sub-recurso binario débil) ---
  /cars/{id}/insurance:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [cars, files]
      summary: Descargar el seguro (owner/admin)
      security:
        - bearerAuth: []
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [cars, files]
      summary: Subir/reemplazar el seguro (owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "204": { description: Subido. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { description: Payload demasiado grande. }
    delete:
      tags: [cars, files]
      summary: Quitar el seguro (owner)
      security:
        - bearerAuth: []
      responses:
        "204": { description: Quitado. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /image/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [files]
      summary: Bytes públicos de una imagen por id
      description: >
        URI canónica para blobs anónimos referenciados por id (p.ej. foto adjunta
        a una reseña vía `review.links.image`). No sirve documentos KYC, comprobantes
        ni seguros. Covers de autos y fotos de perfil usan sub-recursos tipados
        (`/cars/{id}/pictures/primary`, `/users/{id}/profile-picture`), no esta URI.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/BinaryImage"
        "404": { $ref: "#/components/responses/NotFound" }

  #############################################################################
  # RESERVATIONS
  #############################################################################
  /reservations:
    get:
      tags: [reservations]
      summary: Listar reservas (reemplaza /my-reservations, /my-cars/reservations, /admin/reservations)
      description: >
        Una sola colección. El rol del llamante + query params determinan qué
        ve (decisión documentada, ver auditoría A14): (1) `riderId` → reservas
        donde el usuario es rider, requiere ser ese usuario o admin (403 si
        no); (2) sin `riderId`, `ownerId` → reservas sobre autos del usuario,
        mismo chequeo self-o-admin; (3) sin `riderId` ni `ownerId` → TODAS las
        reservas, solo admin (403 en caso contrario). Como en `GET /cars`, es
        un filtro de colección legítimo, no una operación distinta por rol.
        Paginación por header `Link`. La colección devuelve solo links (`self`);
        seguir cada uno con `Accept: application/vnd.paw.reservation.summary.v1+json`.
        **Patrón A (link-only):** URN canónica de cada ítem =
        `GET /reservations/{id}` (teaser vía negociación `Accept` en el ítem).
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: riderId
          in: query
          schema: { type: integer, format: int64 }
          description: Reservas donde el usuario es rider.
        - name: ownerId
          in: query
          schema: { type: integer, format: int64 }
          description: Reservas sobre autos del usuario (vista owner).
        - name: carId
          in: query
          schema: { type: integer, format: int64 }
        - name: status
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/ReservationStatus" } }
        - name: riderStatus
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/ReservationStatus" } }
          description: Estados adicionales de la vista rider; se combinan con `status`.
        - name: q
          in: query
          schema: { type: string }
        - name: category
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/CarType" } }
        - name: transmission
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/Transmission" } }
        - name: powertrain
          in: query
          style: form
          explode: true
          schema: { type: array, items: { $ref: "#/components/schemas/Powertrain" } }
        - name: priceMin
          in: query
          schema: { type: number }
        - name: priceMax
          in: query
          schema: { type: number }
        - name: rating
          in: query
          style: form
          explode: true
          schema: { type: array, items: { type: number, minimum: 0, maximum: 5 } }
        - name: sort
          in: query
          schema: { type: string, enum: [recent, start_date, price_asc, price_desc] }
      responses:
        "200":
          description: Links a reservas.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.reservation.links.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Links" }
        "204": { description: Sin reservas. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: riderId/ownerId de otro usuario sin ser admin, o listado admin (sin filtro) sin ser admin.
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }
    post:
      tags: [reservations]
      summary: Crear una reserva (rider) — reemplaza POST /reservation
      requestBody:
        required: true
        content:
          application/vnd.paw.reservation.v1+json:
            schema: { $ref: "#/components/schemas/ReservationCreateDto" }
      responses:
        "201":
          description: Reserva creada (status PENDING).
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.reservation.v1+json:
              schema: { $ref: "#/components/schemas/ReservationDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403":
          description: Rider sin documentos, owner sin cbu, o reserva sobre auto propio.
        "409":
          description: Conflicto de fechas (ReservationConflictException).

  /reservations/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [reservations]
      summary: Detalle o teaser de una reserva (misma URI, MIME distinto)
      description: >
        `Accept: application/vnd.paw.reservation.v1+json` → detalle completo;
        `Accept: application/vnd.paw.reservation.summary.v1+json` → teaser para
        tarjetas de listado (misma URN canónica).
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
            example: application/vnd.paw.reservation.v1+json
      responses:
        "200":
          description: Reserva.
          content:
            application/vnd.paw.reservation.v1+json:
              schema: { $ref: "#/components/schemas/ReservationDto" }
            application/vnd.paw.reservation.summary.v1+json:
              schema: { $ref: "#/components/schemas/ReservationSummaryDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [reservations]
      summary: Transiciones de estado de la reserva (accept/cancel/return/finish + editar fechas)
      description: >
        Absorbe TODAS las acciones del MVC sobre la reserva:
        - Editar fechas de una PENDING impaga (rider) → { "startDate", "endDate" }.
        - Cancelar (rider u owner) → { "status": "cancelled_by_rider" |
          "cancelled_by_owner" }. Reemplaza /cancel. Genera obligación de
          refund si correspondía.
        - Marcar auto devuelto (owner) → { "carReturned": true }. Reemplaza
          /car-returned. Puede transicionar a FINISHED.
        - (La transición PENDING→ACCEPTED ocurre al subir el comprobante de
          pago — ver PUT .../payment-receipt — no por PATCH manual.)
        El resource valida la transición permitida según estado y rol
        (403/409 según corresponda).
      requestBody:
        required: true
        content:
          application/vnd.paw.reservation.v1+json:
            schema: { $ref: "#/components/schemas/ReservationPatchDto" }
      responses:
        "200":
          description: Reserva actualizada.
          content:
            application/vnd.paw.reservation.v1+json:
              schema: { $ref: "#/components/schemas/ReservationDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Transición no permitida desde el estado actual.

  /reservations/{id}/counterparty:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [reservations]
      summary: Datos de contacto de la contraparte de la reserva (rider ve al owner, owner ve al rider)
      responses:
        "200":
          description: Contacto de la contraparte.
          content:
            application/vnd.paw.counterpartycontact.v1+json:
              schema: { $ref: "#/components/schemas/CounterpartyContactDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Comprobante de pago (rider) ---
  /reservations/{id}/payment-receipt:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [reservations, files]
      summary: Descargar comprobante de pago (participantes)
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [reservations, files]
      summary: Subir comprobante de pago (rider) — dispara PENDING→ACCEPTED
      description: >
        Subir el comprobante es lo que confirma el pago: el server transiciona
        la reserva a ACCEPTED. Por eso es un PUT al sub-recurso (crear/reemplazar
        el comprobante), no un PATCH de status arbitrario.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "204": { description: Comprobante subido; reserva ACCEPTED. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >
            Conflicto de estado: la reserva no está PENDING, ya tiene comprobante,
            o venció el plazo de carga.

  # --- Comprobante de reintegro (owner) ---
  /reservations/{id}/refund-receipt:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [reservations, files]
      summary: Descargar comprobante de reintegro (participantes)
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [reservations, files]
      summary: Subir comprobante de reintegro (owner)
      description: >
        Reemplaza el sub-recurso binario de reintegro. Si el owner no tiene más
        reintegros vencidos pendientes, el server puede desbloquear su cuenta.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "204": { description: Subido. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >
            Conflicto de estado: la reserva no está cancelada, el reintegro no
            es requerido, o ya tiene comprobante.

  #############################################################################
  # RESERVATION MESSAGES (chat) — entidad débil
  #############################################################################
  /reservations/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [reservations]
      summary: Mensajes del chat (participantes/admin) — paginado y polleable
      description: >
        Reemplaza GET /messages y el endpoint de polling: el "polling" se hace
        con el mismo recurso + query param `afterId` (o paginación por `Link`).

        **Representación embebida (patrón B):** sub-recurso débil del chat bajo
        la reserva. El listado incluye cuerpo/adjuntos porque la UI de chat y
        el polling necesitan el contenido en la misma respuesta. Cada mensaje
        trae `links.self` → `GET /reservations/{id}/messages/{messageId}`.

        **Solo lectura:** este GET no marca mensajes como leídos. El cliente
        registra la lectura con `POST /reservations/{id}/message-receipts`
        (link `message-receipts` en la reserva).

        Con `afterId`, la respuesta es una ventana incremental (hasta el
        `pageSize` de historial) **sin** headers `Link` ni `X-Total-Count`.
        Sin `afterId`, la colección pagina con `Link` + `X-Total-Count`.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeMessages"
        - name: afterId
          in: query
          schema: { type: integer, format: int64 }
          description: >
            Devuelve solo mensajes con id mayor (poll). Ignora page/pageSize y
            no emite headers de paginación.
      responses:
        "200":
          description: >
            Mensajes. Sin `afterId`: headers `Link` + `X-Total-Count`.
            Con `afterId`: array acotado **sin** esos headers (poll incremental).
          headers:
            Link:
              description: >
                RFC 8288 pagination links. Emitido solo cuando `afterId` está ausente.
              schema: { type: string }
            X-Total-Count:
              description: >
                Total de mensajes del historial. Emitido solo cuando `afterId` está ausente.
              schema: { type: integer, format: int64 }
          content:
            application/vnd.paw.message.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MessageDto" }
        "204": { description: Sin mensajes (nuevos). }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [reservations]
      summary: Enviar un mensaje (participantes)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                body: { type: string }
                file: { type: string, format: binary }
      responses:
        "201":
          description: Mensaje enviado.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.message.v1+json:
              schema: { $ref: "#/components/schemas/MessageDto" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /reservations/{id}/message-receipts:
    parameters:
      - $ref: "#/components/parameters/idPath"
    post:
      tags: [reservations]
      summary: Registrar lectura del chat (marcar mensajes del otro como seen)
      description: >
        Crea un recibo de lectura para el participante autenticado: marca como
        `seen` los mensajes del counterparty aún no leídos. Separado del GET
        de mensajes para que GET no mute estado (REST).
        Descubrible vía `links.message-receipts` en la reserva.
      responses:
        "204": { description: Recibo registrado (idempotente si no había unread). }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /reservations/{id}/messages/{messageId}:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: messageId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [reservations]
      summary: Detalle de un mensaje del chat
      responses:
        "200":
          description: Mensaje.
          content:
            application/vnd.paw.message.v1+json:
              schema: { $ref: "#/components/schemas/MessageDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /reservations/{id}/messages/{messageId}/attachment:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: messageId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [reservations, files]
      summary: Descargar el adjunto de un mensaje (participantes)
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  #############################################################################
  # CATÁLOGO: BRANDS / MODELS
  #############################################################################
  /brands:
    get:
      tags: [catalog]
      summary: Listar marcas
      description: >
        **Representación embebida (patrón B):** catálogo de referencia pequeño;
        la colección es la representación principal de cada marca (`BrandDto`
        con `links.self`). No apunta a recursos canónicos definidos en otro
        agregado.
      parameters:
        - name: validated
          in: query
          schema: { type: boolean }
          description: Filtra pendientes (validated=false) — útil para el panel admin.
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      security: []
      responses:
        "200":
          description: Marcas.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.brand.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BrandDto" }
        "204": { description: Colección vacía. }
    post:
      tags: [catalog]
      summary: Crear una marca
      description: Si la crea un no-admin queda validated=false (pendiente de aprobación).
      requestBody:
        required: true
        content:
          application/vnd.paw.brand.v1+json:
            schema: { $ref: "#/components/schemas/BrandCreateDto" }
      responses:
        "201":
          description: Marca creada.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.brand.v1+json:
              schema: { $ref: "#/components/schemas/BrandDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: Ya existe una marca con ese nombre.
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }

  /brands/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [catalog]
      summary: Detalle de marca
      description: >
        Marcas validadas son públicas. Marcas pendientes (`validated = false`) solo las ve un admin;
        para el resto de callers la API responde 404 (mismo cuerpo que marca inexistente).
      security: []
      responses:
        "200":
          description: Marca.
          content:
            application/vnd.paw.brand.v1+json:
              schema: { $ref: "#/components/schemas/BrandDto" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [catalog]
      summary: Aprobar marca (admin) — reemplaza /admin/catalog/.../validate
      description: '{ "validated": true } aprueba la marca (solo admin). Rechazar = DELETE (decisión D6).'
      requestBody:
        required: true
        content:
          application/vnd.paw.brand.v1+json:
            schema: { $ref: "#/components/schemas/CatalogApprovalDto" }
      responses:
        "200":
          description: Marca actualizada.
          content:
            application/vnd.paw.brand.v1+json:
              schema: { $ref: "#/components/schemas/BrandDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [catalog]
      summary: Rechazar/eliminar marca (admin)
      description: Reemplaza /admin/catalog/.../reject. Borra la fila pendiente.
      responses:
        "204": { description: Eliminada. }
        "403": { $ref: "#/components/responses/Forbidden" }

  /brands/{id}/models:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [catalog]
      summary: Modelos de una marca
      parameters:
        - name: validated
          in: query
          schema: { type: boolean }
      security: []
      responses:
        "200":
          description: Modelos.
          headers:
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.model.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModelDto" }
        "204": { description: Colección vacía. }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [catalog]
      summary: Crear modelo bajo una marca
      requestBody:
        required: true
        content:
          application/vnd.paw.model.v1+json:
            schema: { $ref: "#/components/schemas/ModelCreateDto" }
      responses:
        "201":
          description: Modelo creado.
          headers:
            Location: { $ref: "#/components/headers/Location" }
          content:
            application/vnd.paw.model.v1+json:
              schema: { $ref: "#/components/schemas/ModelDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Ya existe un modelo con ese nombre para la marca.
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }

  /brands/{id}/models/{modelId}:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: modelId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [catalog]
      summary: Detalle de modelo (canónico bajo su marca)
      security: []
      responses:
        "200":
          description: Modelo.
          content:
            application/vnd.paw.model.v1+json:
              schema: { $ref: "#/components/schemas/ModelDto" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [catalog]
      summary: Aprobar modelo (admin)
      description: '{ "validated": true } aprueba el modelo (solo admin).'
      requestBody:
        required: true
        content:
          application/vnd.paw.model.v1+json:
            schema: { $ref: "#/components/schemas/CatalogApprovalDto" }
      responses:
        "200":
          description: Modelo actualizado.
          content:
            application/vnd.paw.model.v1+json:
              schema: { $ref: "#/components/schemas/ModelDto" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [catalog]
      summary: Rechazar/eliminar modelo (admin)
      responses:
        "204": { description: Eliminado. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /brands/{id}/models/{modelId}/price-insight:
    parameters:
      - $ref: "#/components/parameters/idPath"
      - name: modelId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [catalog]
      summary: Estadísticas de precio comparables para el modelo (canónico)
      description: >
        Sin `excludeCarId`, 204 (no hay auto de referencia a excluir). Con
        `excludeCarId`, agrega min/max/promedio de `dayPrice` entre los autos
        elegibles del mismo par marca/modelo (catálogo validado, dueño no
        bloqueado, con disponibilidad activa), excluyendo ese auto; 204 si no
        hay comparables.
      parameters:
        - name: excludeCarId
          in: query
          schema: { type: integer, format: int64 }
      security: []
      responses:
        "200":
          description: Estadísticas de precio.
          content:
            application/vnd.paw.pricemarketinsight.v1+json:
              schema: { $ref: "#/components/schemas/PriceMarketInsightDto" }
        "204": { description: Sin auto de referencia o sin comparables. }
        "404": { $ref: "#/components/responses/NotFound" }

  /models:
    get:
      tags: [catalog]
      summary: Listar modelos pendientes (admin)
      description: >
        Listado admin de modelos pendientes de aprobación. Sólo soporta la proyección
        pendiente (validated=false u omitido): incluye modelos pendientes de marcas ya
        validadas (que de otro modo quedarían invisibles para el admin).
        Paginado con `page` / `pageSize`, headers `Link` + `X-Total-Count`.
        `validated=true` → 400.

        **Representación embebida (patrón B):** catálogo admin; cada `ModelDto`
        incluye `links.self`.
      parameters:
        - name: validated
          in: query
          required: false
          schema: { type: boolean, enum: [false] }
          description: Omitido o false = cola pendiente. true → 400.
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Modelos pendientes.
          headers:
            Link: { $ref: "#/components/headers/Link-Pagination" }
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.model.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModelDto" }
        "204": { description: No hay modelos pendientes. }
        "400":
          description: >
            validated=true no soportado (los modelos validados se navegan vía su
            marca, no hay colección plana de validados).
          content:
            application/vnd.paw.error.v1+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  #############################################################################
  # LOCATIONS
  #############################################################################
  /neighborhoods:
    get:
      tags: [locations]
      summary: Listar barrios (catálogo para selects de ubicación)
      description: >
        **Representación embebida (patrón B):** catálogo de referencia para
        filtros y formularios; lista completa sin paginación; cada ítem con
        `links.self`.
      security: []
      responses:
        "200":
          description: Barrios.
          headers:
            X-Total-Count: { $ref: "#/components/headers/X-Total-Count" }
          content:
            application/vnd.paw.neighborhood.v1+json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NeighborhoodDto" }
        "204": { description: Catálogo vacío. }

  /neighborhoods/{id}:
    parameters:
      - $ref: "#/components/parameters/idPath"
    get:
      tags: [locations]
      summary: Obtener un barrio por su URN canónica
      security: []
      responses:
        "200":
          description: Barrio.
          content:
            application/vnd.paw.neighborhood.v1+json:
              schema: { $ref: "#/components/schemas/NeighborhoodDto" }
        "404": { $ref: "#/components/responses/NotFound" }

#############################################################################
# COMPONENTS
#############################################################################
components:

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >
        Authorization: Basic base64(email:secret) a CUALQUIER endpoint.
        El secret depende del contexto:
        - Cuenta verificada: password (BCrypt).
        - Verificación de email (cuenta sin verificar): OTP de 6 dígitos enviado
          por mail tras POST /users. Se consume al autenticar; devuelve JWT.
        - Reset de password olvidado: OTP enviado tras POST /credentials. Otorga
          authority ROLE_PASSWORD_RESET_OTP; se consume al completar PATCH
          /users/{id} con password + passwordConfirm.
        Tras auth válida el server responde con X-Access-Token, X-Refresh-Token
        y Link rel="authenticated-user". No hay /login ni /verify.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Requests normales: Authorization: Bearer <access_token>. Cuando vence
        (401), se manda el Refresh Token (también como Bearer) a cualquier
        endpoint y el server devuelve un par nuevo en headers. No hay /refresh:
        el JWT es autocontenido y el server distingue access de refresh.

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
      description: Número de página (la metadata de paginación va en el header Link, no en el body).
    pageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 8 }
      description: >
        Tamaño de página efectivo (clamp máx. 100). Default 8 para colecciones
        generales (usuarios, reservas, favoritos, marcas).
    pageSizeBrowse:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 8 }
      description: Default 8 — grillas de búsqueda / home (`GET /cars`).
    pageSizeReviews:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 6 }
      description: Default 6 — reseñas públicas de auto o perfil.
    pageSizeAvailabilities:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 4 }
      description: Default 4 — períodos de disponibilidad del auto.
    pageSizePictures:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 8 }
      description: Default 8 — galería del auto (fotos/videos).
    pageSizeMessages:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      description: Default 50 — chat de reserva (también límite de polling {@code afterId}).

  headers:
    Location:
      description: URN canónica del recurso recién creado.
      schema: { type: string, format: uri }
    Link-Pagination:
      description: >
        Links de paginación con rel="first" | "prev" | "next" | "last",
        honrando los query params de filtro activos. El cliente los navega
        genéricamente; NO construye URLs a mano.
      schema: { type: string }
      example: '</cars?page=2&category=suv>; rel="next", </cars?page=5&category=suv>; rel="last"'
    X-Total-Count:
      description: Cantidad total de elementos (opcional, complementa Link).
      schema: { type: integer }
    Link-AuthenticatedUser:
      description: Tras autenticar, Link rel="authenticated-user" con la URN del usuario logueado (sustituto canónico de /me).
      schema: { type: string }
      example: '</users/42>; rel="authenticated-user"'
    X-Access-Token:
      description: Access Token (JWT, vida corta). Devuelto tras Basic auth o refresh.
      schema: { type: string }
    X-Refresh-Token:
      description: Refresh Token (JWT, vida larga). Devuelto tras Basic auth o refresh.
      schema: { type: string }

  responses:
    Unauthorized:
      description: 401 — Falta autenticación o token inválido/vencido.
      content:
        application/vnd.paw.error.v1+json:
          schema: { $ref: "#/components/schemas/ErrorDto" }
    Forbidden:
      description: 403 — Autenticado pero sin permiso.
      content:
        application/vnd.paw.error.v1+json:
          schema: { $ref: "#/components/schemas/ErrorDto" }
    NotFound:
      description: 404 — El recurso no existe.
      content:
        application/vnd.paw.error.v1+json:
          schema: { $ref: "#/components/schemas/ErrorDto" }
    NotModified:
      description: >
        304 — La representación no cambió desde el `ETag` enviado en
        `If-None-Match` (GET condicional).
      headers:
        ETag:
          schema: { type: string }
        Vary:
          schema: { type: string, example: Accept }
    MethodNotAllowed:
      description: 405 — El recurso existe pero el verbo no aplica.
      content:
        application/vnd.paw.error.v1+json:
          schema: { $ref: "#/components/schemas/ErrorDto" }
    ValidationError:
      description: 400 — Request mal formado o validación fallida.
      content:
        application/vnd.paw.validation-error.v1+json:
          schema: { $ref: "#/components/schemas/ValidationErrorDto" }
    BinaryImage:
      description: Bytes de una imagen (content-type detectado).
      content:
        image/*:
          schema: { type: string, format: binary }
    BinaryFile:
      description: Bytes de un archivo (pdf/imagen/video; content-type detectado).
      content:
        application/octet-stream:
          schema: { type: string, format: binary }
        image/*:
          schema: { type: string, format: binary }
        video/*:
          schema: { type: string, format: binary }

  schemas:

    Links:
      type: object
      description: Bloque de hipervínculos generado on-the-fly. Siempre incluye self. NUNCA se persiste.
      additionalProperties: { type: string, format: uri }
      properties:
        self: { type: string, format: uri }
        identityDocument:
          type: string
          format: uri
          description: Document endpoint emitted on private user representations for authenticated GET, PUT, and DELETE.
        licenseDocument:
          type: string
          format: uri
          description: License endpoint emitted on private user representations for authenticated GET, PUT, and DELETE.
        blocked-overdue-reservation:
          type: string
          format: uri
          description: >
            Present on a blocked user's private profile when exactly one reservation has an overdue
            refund proof (deep-link CTA for the blocked-owner banner).
      required: [self]

    ApiIndex:
      type: object
      properties:
        links:
          type: object
          additionalProperties: { type: string, format: uri }
          description: rel → href navigation map (includes self).
        resources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ApiIndexResourceDescriptor"
    ApiIndexResourceDescriptor:
      type: object
      properties:
        href:
          type: string
          format: uri
          nullable: true
          description: >
            Absolute collection href. Null when the resource is item-only
            (e.g. `image` has no top-level collection).
        itemTemplate:
          type: string
          format: uri-template
          description: Canonical item URI template published for bookmark/deep-link recovery (for example `/cars/{id}`).
        queryParams:
          type: array
          items: { type: string }
      required: [queryParams]

    ClientConfig:
      type: object
      description: Public SPA validation/upload limits (mirrors application.properties).
      properties:
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self → GET /config.
        cbuRequiredDigits: { type: integer, minimum: 1 }
        maxBillableDays: { type: integer, minimum: 1 }
        pickupLeadHours: { type: integer, minimum: 0 }
        car:
          type: object
          properties:
            brandMinLength: { type: integer }
            brandMaxLength: { type: integer }
            modelMaxLength: { type: integer }
            plateMinLength: { type: integer }
            plateMaxLength: { type: integer }
            descriptionMaxLength: { type: integer }
            yearMin: { type: integer }
            galleryMaxItems: { type: integer }
          required:
            - brandMinLength
            - brandMaxLength
            - modelMaxLength
            - plateMinLength
            - plateMaxLength
            - descriptionMaxLength
            - yearMin
            - galleryMaxItems
        upload:
          type: object
          properties:
            maxImageMegabytes: { type: integer }
            maxCarGalleryVideoMegabytes: { type: integer }
            maxProfileDocumentMegabytes: { type: integer }
            maxPaymentReceiptMegabytes: { type: integer }
          required:
            - maxImageMegabytes
            - maxCarGalleryVideoMegabytes
            - maxProfileDocumentMegabytes
            - maxPaymentReceiptMegabytes
        money:
          type: object
          properties:
            currency: { type: string }
            formatLocale: { type: string }
          required: [currency, formatLocale]
        user:
          type: object
          properties:
            displayNamePartMaxLength: { type: integer }
            profileAboutMaxLength: { type: integer }
            registrationPasswordMinLength: { type: integer }
            registrationPasswordMaxLength: { type: integer }
            registrationEmailMaxLength: { type: integer }
            profilePhoneMaxLength: { type: integer }
          required:
            - displayNamePartMaxLength
            - profileAboutMaxLength
            - registrationPasswordMinLength
            - registrationPasswordMaxLength
            - registrationEmailMaxLength
            - profilePhoneMaxLength
        chat:
          type: object
          description: Reservation chat limits (mirrors app.reservation.chat.* and upload policy).
          properties:
            maxAttachmentMegabytes: { type: integer, minimum: 1 }
            messageMaxLength: { type: integer, minimum: 1 }
            historyPageSize: { type: integer, minimum: 1 }
          required: [maxAttachmentMegabytes, messageMaxLength, historyPageSize]
        review:
          type: object
          properties:
            commentMaxLength: { type: integer }
          required: [commentMaxLength]
        listing:
          type: object
          properties:
            pricePerDayMin: { type: number }
            addressStreetMaxLength: { type: integer }
            addressNumberMaxLength: { type: integer }
            pricePerDayIntegerDigits: { type: integer }
            pricePerDayFractionDigits: { type: integer }
          required:
            - pricePerDayMin
            - addressStreetMaxLength
            - addressNumberMaxLength
            - pricePerDayIntegerDigits
            - pricePerDayFractionDigits
      required: [cbuRequiredDigits, maxBillableDays, pickupLeadHours, car, upload, money, user, chat, review, listing]

    # ----- USER -----
    UserDto:
      type: object
      description: >
        Representación pública fija (`Accept: application/vnd.paw.user.v1+json`).
        NO incluye email, CBU, teléfono, role, blocked ni estado KYC/documental;
        usar UserPrivateDto para esos datos.
      properties:
        forename: { type: string }
        surname: { type: string }
        memberSince: { type: string, format: date }
        emailVerified: { type: boolean }
        ratingAsRider: { type: number, nullable: true }
        ratingAsOwner: { type: number, nullable: true }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self, profilePicture (siempre — presencia de bytes vía hasProfilePicture / GET), cars, reviews, credentials (solo mientras emailVerified=false).

    UserPrivateDto:
      type: object
      description: >
        Representación privada fija (`Accept: application/vnd.paw.user.private.v1+json`).
        Solo self/admin; 403 si se pide sin permiso.
      properties:
        forename: { type: string }
        surname: { type: string }
        email: { type: string, format: email }
        phoneNumber: { type: string, nullable: true }
        birthDate: { type: string, format: date, nullable: true }
        about: { type: string, nullable: true }
        cbu: { type: string, nullable: true }
        memberSince: { type: string, format: date }
        latestLocale: { type: string, nullable: true }
        emailVerified: { type: boolean }
        licenseValidated: { type: boolean }
        identityValidated: { type: boolean }
        licenseUploaded: { type: boolean }
        identityUploaded: { type: boolean }
        hasProfilePicture: { type: boolean, description: True cuando hay bytes de foto; links.profilePicture se anuncia siempre. }
        blocked: { type: boolean }
        role: { type: string, enum: [user, admin] }
        ratingAsRider: { type: number, nullable: true }
        ratingAsOwner: { type: number, nullable: true }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: >
            self, profilePicture (siempre), cars, reservations, owned-reservations, favorites,
            favorites-item-template (RFC 6570 …/favorites/{carId}), reviews, identityDocument,
            licenseDocument, credentials (solo mientras emailVerified=false),
            blocked-overdue-reservation (cuando aplica).

    UserCreateDto:
      type: object
      required: [email, forename, surname, password, passwordConfirm]
      properties:
        email: { type: string, format: email }
        forename: { type: string }
        surname: { type: string }
        password: { type: string, format: password, writeOnly: true }
        passwordConfirm: { type: string, format: password, writeOnly: true }

    AdminCreateUserDto:
      type: object
      description: >
        Body de POST /users con Content-Type admincreateuser. Sin password: el
        servidor emite un OTP de set-password (mismo flujo que forgot-password).
      required: [email, forename, surname]
      properties:
        email: { type: string, format: email }
        forename: { type: string }
        surname: { type: string }

    UserPatchDto:
      type: object
      description: >
        Todos opcionales; solo se envían los atributos a cambiar. OTPs de
        verificación/reset NO van en el body — viajan en Authorization Basic
        email:otp. La autorización depende de cada campo (self vs admin) y de
        la credencial presentada.
      properties:
        forename: { type: string }
        surname: { type: string }
        phoneNumber: { type: string }
        birthDate: { type: string, format: date }
        about: { type: string }
        cbu: { type: string }
        latestLocale: { type: string }
        password: { type: string, format: password, writeOnly: true }
        passwordConfirm: { type: string, format: password, writeOnly: true, description: Requerido junto con password en reset olvidado. }
        currentPassword: { type: string, format: password, writeOnly: true, description: Requerido al cambiar password estando logueado. }
        role: { type: string, enum: [user, admin], description: Solo admin. }
        blocked: { type: boolean, description: Solo admin. }
        identityValidated: { type: boolean, description: Solo admin. }
        licenseValidated: { type: boolean, description: Solo admin. }

    # ----- CAR -----
    CarType:
      type: string
      enum: [sedan, hatchback, suv, coupe, convertible, wagon, van, pickup]
    Powertrain:
      type: string
      enum: [gasoline, diesel, electric, hybrid, cng]
    Transmission:
      type: string
      enum: [manual, automatic, semi_automatic]
    CarStatus:
      type: string
      enum: [active, paused, admin_paused, lack_doc, unavailable, deactivated]
    PriceMarketPosition:
      type: string
      enum: [below_market, at_market, above_market]
      description: Consumer browse card badge relative to same brand/model market average.

    CarSummaryDto:
      type: object
      description: >
        Teaser para colecciones (`Accept: application/vnd.paw.car.summary.v1+json`).
        Browse, favoritos y "mis autos" usan esta vista; el detalle completo es `CarDto`.
      properties:
        brandName: { type: string }
        modelName: { type: string }
        year: { type: integer, nullable: true }
        status: { $ref: "#/components/schemas/CarStatus" }
        minimumRentalDays: { type: integer }
        ratingAvg: { type: number, nullable: true }
        dayPrice:
          type: number
          nullable: true
          description: Lowest active day price when published.
        modelValidated: { type: boolean }
        priceMarketPositionModifier:
          allOf:
            - $ref: "#/components/schemas/PriceMarketPosition"
          nullable: true
        marketAveragePrice: { type: number, nullable: true }
        marketSampleCount: { type: integer, format: int64, nullable: true }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: >
            self, owner, cover (browse), pictures, availabilities, bookable-segments,
            insurance, reviews, similar; model, brand y price-insight solo cuando el
            teaser se sirve desde el recurso completo (GET /cars/{id} con Accept summary).

    CarDto:
      type: object
      description: >
        Detalle público (`Accept: application/vnd.paw.car.v1+json`). El campo `plate`
        es siempre null / omitible — la patente solo viaja en `CarPrivateDto`.
      properties:
        plate: { type: string, nullable: true, description: Siempre null en la representación pública. }
        year: { type: integer, nullable: true }
        powertrain: { $ref: "#/components/schemas/Powertrain" }
        transmission: { $ref: "#/components/schemas/Transmission" }
        type: { $ref: "#/components/schemas/CarType" }
        status: { $ref: "#/components/schemas/CarStatus" }
        description: { type: string, nullable: true }
        minimumRentalDays: { type: integer }
        ratingAvg: { type: number, nullable: true }
        dayPrice:
          type: number
          nullable: true
          description: Lowest active day price; populated on browse card projections only.
        brandName: { type: string }
        modelName: { type: string }
        modelValidated: { type: boolean }
        hasInsurance: { type: boolean }
        priceMarketPositionModifier:
          allOf:
            - $ref: "#/components/schemas/PriceMarketPosition"
          nullable: true
          description: Consumer browse/favorites cards when comparable market data exists.
        marketAveragePrice:
          type: number
          nullable: true
          description: Same brand/model market average day price backing the badge.
        marketSampleCount:
          type: integer
          format: int64
          nullable: true
          description: Number of comparable active listings used for the badge.
        createdAt: { type: string, format: date-time }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"

    CarPrivateDto:
      allOf:
        - $ref: "#/components/schemas/CarDto"
        - type: object
          required: [plate]
          description: >
            Detalle owner/admin (`Accept: application/vnd.paw.car.private.v1+json`).
            Misma URN que CarDto; 403 si se pide sin permiso.
          properties:
            plate: { type: string, description: Patente del vehículo (solo owner/admin). }

    CarCreateDto:
      type: object
      required: [plate, transmission, powertrain]
      properties:
        plate: { type: string }
        year: { type: integer }
        powertrain: { $ref: "#/components/schemas/Powertrain" }
        transmission: { $ref: "#/components/schemas/Transmission" }
        description: { type: string }
        minimumRentalDays: { type: integer, default: 1 }
        # Catálogo: por nombre o por URN de modelo existente.
        brandName: { type: string }
        modelName: { type: string }
        type: { $ref: "#/components/schemas/CarType" }
        modelUri:
          type: string
          format: uri
          description: >
            URN anidada del modelo existente (`/brands/{brandId}/models/{modelId}` desde `links.self`).
            Alternativa a brand/model name en el body de creación.

    CarPatchDto:
      type: object
      description: Transiciones de estado y ediciones parciales del auto.
      properties:
        status: { $ref: "#/components/schemas/CarStatus" }
        description: { type: string }
        minimumRentalDays: { type: integer }

    AvailabilityDto:
      type: object
      properties:
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        dayPrice: { type: number }
        startPointStreet: { type: string }
        startPointNumber: { type: string, nullable: true }
        checkInTime: { type: string, example: "10:00" }
        checkOutTime: { type: string, example: "20:00" }
        kind: { type: string, enum: [offered, withdrawn] }
        links:
          type: object
          additionalProperties: { type: string, format: uri }
          properties:
            self: { type: string, format: uri }
            car: { type: string, format: uri }
            neighborhood: { type: string, format: uri }
          description: >
            car and neighborhood links; self is omitted for computed month
            projections because they are not individually dereferenceable.

    AvailabilityCreateDto:
      type: object
      required: [startDate, endDate, dayPrice, startPointStreet, neighborhoodUri, checkInTime, checkOutTime]
      properties:
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        dayPrice: { type: number }
        startPointStreet: { type: string }
        startPointNumber: { type: string }
        neighborhoodUri: { type: string, format: uri, description: Canonical neighborhood URN (GET /neighborhoods/{id}). }
        checkInTime: { type: string, example: "10:00" }
        checkOutTime: { type: string, example: "20:00" }

    PictureDto:
      type: object
      properties:
        displayOrder: { type: integer }
        kind: { type: string, enum: [image, video] }
        contentType: { type: string }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self (bytes), car.

    BookableSegmentDto:
      type: object
      description: >
        Recurso de solo lectura, sin URN propia (no es una entidad de dominio): una fila
        agregada de disponibilidad efectiva para el selector de fechas del rider.
      properties:
        from: { type: string, format: date }
        to: { type: string, format: date }
        dayPrice: { type: number, nullable: true }
        checkInTime: { type: string, nullable: true, example: "10:00" }
        checkOutTime: { type: string, nullable: true, example: "10:00" }
        location: { type: string }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: neighborhood, availability (URN del período), car (opcional).

    # ----- RESERVATION -----
    ReservationStatus:
      type: string
      enum:
        - pending
        - accepted
        - started
        - cancelled
        - cancelled_by_rider
        - cancelled_by_owner
        - cancelled_due_to_missing_payment_proof
        - finished

    ReservationSummaryDto:
      type: object
      description: >
        Teaser para colecciones (`Accept: application/vnd.paw.reservation.summary.v1+json`).
      properties:
        startDate: { type: string, format: date-time, description: UTC. }
        endDate: { type: string, format: date-time, description: UTC. }
        status: { $ref: "#/components/schemas/ReservationStatus" }
        totalPrice: { type: number }
        brandName: { type: string, description: Marca del auto de la reserva (denormalizada para listados). }
        modelName: { type: string, description: Modelo del auto de la reserva (denormalizada para listados). }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self, car, messages, reviews, cover (cuando hay imagen).

    ReservationDto:
      type: object
      properties:
        startDate: { type: string, format: date-time, description: UTC. }
        endDate: { type: string, format: date-time, description: UTC. }
        status: { $ref: "#/components/schemas/ReservationStatus" }
        totalPrice: { type: number }
        carReturned: { type: boolean }
        carReturnedAt:
          type: string
          format: date-time
          nullable: true
          description: >
            Momento en que el dueño marcó la devolución (UTC). Inicio de la ventana
            de reseña del owner (app.reservation.review-auto-skip-days).
        paymentProofDeadlineAt: { type: string, format: date-time, nullable: true }
        refundProofDeadlineAt: { type: string, format: date-time, nullable: true }
        paymentRefundRequired: { type: boolean }
        hasPaymentReceipt: { type: boolean }
        hasRefundReceipt: { type: boolean }
        ownerCbu:
          type: string
          nullable: true
          description: CBU del dueño del auto, para que el rider transfiera el pago.
        pickupStreet: { type: string, nullable: true, description: Calle de entrega/devolución. }
        pickupNumber: { type: string, nullable: true }
        pickupNeighborhood: { type: string, nullable: true }
        checkInTime: { type: string, nullable: true, example: "10:00" }
        checkOutTime: { type: string, nullable: true, example: "18:00" }
        createdAt: { type: string, format: date-time }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self, car, rider, owner, counterparty, messages, message-receipts, reviews, payment-receipt, refund-receipt.

    CounterpartyContactDto:
      type: object
      properties:
        forename: { type: string }
        surname: { type: string }
        email: { type: string, format: email }
        phoneNumber: { type: string, nullable: true }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self (perfil público) y profilePicture (bytes vía GET; presencia vía hasProfilePicture del user).

    ReservationCreateDto:
      type: object
      required: [carUri, availabilityUri, startDate, endDate]
      properties:
        carUri: { type: string, format: uri, description: URN del auto a reservar (se navega, no se arma a mano). }
        availabilityUri: { type: string, format: uri, description: URN del período de disponibilidad. }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }

    ReservationPatchDto:
      type: object
      properties:
        status: { $ref: "#/components/schemas/ReservationStatus" }
        carReturned: { type: boolean }
        startDate: { type: string, format: date-time, description: Solo PENDING impaga (rider). }
        endDate: { type: string, format: date-time }

    MessageAttachmentDto:
      type: object
      description: Metadatos del adjunto (sin bytes); null si el mensaje no tiene archivo.
      required: [fileName, contentType, sizeBytes, kind]
      properties:
        fileName: { type: string }
        contentType: { type: string, description: MIME type almacenado (p.ej. application/pdf). }
        sizeBytes: { type: integer, format: int64, minimum: 0 }
        kind:
          type: string
          enum: [IMAGE, PDF, DOCUMENT, VIDEO, GENERIC]
          description: Categoría de UI para icono/etiqueta.

    MessageDto:
      type: object
      properties:
        body: { type: string }
        createdAt: { type: string, format: date-time }
        seen: { type: boolean }
        hasAttachment: { type: boolean }
        attachment:
          allOf:
            - $ref: "#/components/schemas/MessageAttachmentDto"
          nullable: true
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self, reservation, sender, attachment (si hay).

    # ----- REVIEW -----
    ReviewDto:
      type: object
      description: >
        Review es una entidad fuerte (id propio); (reservation_id, made_by_rider)
        queda como UNIQUE para la regla de "una reseña por lado", ya no como PK.
        Esto le da a cada reseña una URN única (`links.self` → `/reviews/{id}`).
      properties:
        rating: { type: integer, minimum: 1, maximum: 5, nullable: true }
        comment: { type: string, nullable: true }
        madeByRider: { type: boolean, description: true = reseña del rider hacia el owner. }
        createdAt: { type: string, format: date-time }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: >
            self (`/reviews/{id}`), reservation, car, author, image (si hay).

    # ----- CATALOG -----
    BrandDto:
      type: object
      properties:
        name: { type: string }
        validated: { type: boolean }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self, models.
    BrandCreateDto:
      type: object
      required: [name]
      properties:
        name: { type: string }
    CatalogApprovalDto:
      type: object
      required: [validated]
      properties:
        validated: { type: boolean, example: true }
    ModelDto:
      type: object
      properties:
        name: { type: string }
        type: { $ref: "#/components/schemas/CarType" }
        brandName: { type: string }
        validated: { type: boolean }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self, brand, price-insight.

    PriceMarketInsightDto:
      type: object
      description: >
        Estadísticas de `dayPrice` entre autos comparables (mismo par
        marca/modelo, catálogo validado, dueño no bloqueado, con disponibilidad
        activa), excluyendo el auto de referencia.
      properties:
        minPrice: { type: number }
        maxPrice: { type: number }
        averagePrice: { type: number }
        sampleCount: { type: integer, format: int64 }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self (URI canónica del insight bajo el modelo).

    ModelCreateDto:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { $ref: "#/components/schemas/CarType" }

    # ----- LOCATION -----
    NeighborhoodDto:
      type: object
      properties:
        name: { type: string }
        links:
          allOf:
            - $ref: "#/components/schemas/Links"
          description: self.

    # ----- ERRORS -----
    ErrorDto:
      type: object
      properties:
        status: { type: integer }
        code: { type: string }
        message: { type: string }
    ValidationErrorDto:
      type: object
      properties:
        status: { type: integer, example: 400 }
        message: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
