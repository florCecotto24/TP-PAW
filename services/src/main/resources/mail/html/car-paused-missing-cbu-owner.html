<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.carPausedMissingCbu.emailTitle}">Listing paused</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <div style="padding:36px 0 28px;">
        <a th:href="${homeUrl}"
           style="font-size:22px; font-weight:800; color:#1e1b4b; text-decoration:none;">
            <img src="cid:logo" alt="Ryden"
                 style="height:32px; width:auto; vertical-align:middle;"/> Ryden
        </a>
    </div>

    <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
       th:text="#{mail.carPausedMissingCbu.emailTitle}">
        Listing paused
    </p>
    <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
       th:text="#{mail.common.greeting(${ownerFullName})}">
        Hello,
    </p>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:20px;"
       th:text="#{mail.carPausedMissingCbu.intro(${vehicleLabel},${cbuRequiredDigits})}">
        Intro
    </p>

    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>

    <div style="margin-bottom:20px;">
        <div style="margin-bottom:10px;">
            <a th:href="${profileUrl}"
               style="display:inline-block; padding:12px 24px; background-color:#4338ca;
                      color:#ffffff; text-decoration:none; border-radius:8px;
                      font-size:14px; font-weight:600;"
               th:text="#{mail.carPausedMissingCbu.ctaProfile}">
                Profile
            </a>
        </div>
        <div style="margin-bottom:10px;">
            <a th:href="${ctaUrl}"
               style="display:inline-block; padding:12px 24px; background-color:#ffffff;
                      color:#4338ca; text-decoration:none; border-radius:8px;
                      font-size:14px; font-weight:600; border:1px solid #4338ca;"
               th:text="#{mail.carPausedMissingCbu.ctaCar}">
                View car
            </a>
        </div>
        <p style="font-size:12px; color:#4b5563; line-height:1.6; margin:0;">
            <span th:text="#{mail.common.fallbackAuthLinkCopy}">If the button does not work</span><br/>
            <span th:text="${profileUrl}">profile</span>
        </p>
    </div>

    <p style="font-size:12px; color:#9ca3af; margin-top:24px;"
       th:text="#{mail.common.footer}">
        Footer
    </p>
</div>
</body>
</html>
