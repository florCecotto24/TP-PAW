<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.reservationChatDigest.emailTitle}">New chat messages</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;"><img src="cid:logo"
                                                                           alt="Ryden"
                                                                           style="height:32px; width:auto; vertical-align:middle;"/> Ryden</span>
    </div>

    <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
       th:text="#{mail.reservationChatDigest.emailTitle}">
        New chat messages
    </p>
    <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
       th:text="#{mail.common.greeting(${recipientFullName})}">
        Hello,
    </p>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin:20px 0;"
       th:text="#{mail.reservationChatDigest.intro(${totalMessageCount}, ${conversationCount})}">
        Intro
    </p>

    <div th:each="conversation : ${conversations}"
         style="margin-bottom:28px; padding:20px; background:#ffffff; border-radius:8px; border:1px solid #e5e7eb;">
        <p style="font-size:15px; font-weight:700; color:#3730a3; margin:0 0 16px;"
           th:text="#{mail.reservationChatDigest.conversationHeading(${conversation.vehicleLabel}, ${conversation.reservationId})}">
            Conversation
        </p>

        <div th:each="message : ${conversation.messages}" style="margin-bottom:16px;">
            <p style="font-size:12px; color:#6b7280; margin:0 0 4px;">
                <span th:text="${message.senderFullName}">Sender</span>
                <span th:text="' · ' + ${message.sentAt}"> · time</span>
            </p>
            <blockquote style="margin:0; padding:12px 16px; border-left:4px solid #6366f1; background:#f5f3ff; color:#374151; font-size:14px; line-height:1.5;"
                        th:text="${message.messagePreview}">
                Preview
            </blockquote>
        </div>

        <p style="text-align:center; margin:16px 0 0;">
            <a th:href="${conversation.detailUrl}"
               style="display:inline-block; padding:10px 20px; background-color:#4f46e5; color:#ffffff; text-decoration:none; border-radius:8px; font-weight:600; font-size:13px;"
               th:text="#{mail.reservationChatDigest.cta}">
                Open chat
            </a>
        </p>
    </div>

    <p style="font-size:12px; color:#6b7280; line-height:1.5; margin-top:32px;"
       th:text="#{mail.common.footer}">
        Footer
    </p>

</div>
</body>
</html>
