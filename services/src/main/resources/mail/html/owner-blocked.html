<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.ownerBlocked.emailTitle}">Account blocked</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;"><img src="cid:logo"
                                                                           alt="Ryden"
                                                                           style="height:32px; width:auto; vertical-align:middle;"/> Ryden</span>
    </div>

    <p style="font-size:16px; font-weight:700; color:#b91c1c; margin-bottom:6px;"
       th:text="#{mail.ownerBlocked.emailTitle}">
        Account blocked
    </p>
    <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
       th:text="#{mail.common.greeting(${ownerFullName})}">
        Hello,
    </p>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:16px;"
       th:text="#{mail.ownerBlocked.intro}">
        Your account has been blocked.
    </p>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:8px; font-weight:600;"
       th:text="#{mail.ownerBlocked.overdueListTitle}">
        Pending refund proofs:
    </p>

    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:10px; padding:8px 0; margin-bottom:20px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
               style="font-size:13px; border-collapse:collapse;">
            <thead>
                <tr>
                    <th style="text-align:left; color:#6b7280; padding:8px 16px; font-weight:600; border-bottom:1px solid #f3f4f6;"
                        th:text="#{mail.ownerBlocked.table.vehicle}">Vehicle</th>
                    <th style="text-align:left; color:#6b7280; padding:8px 16px; font-weight:600; border-bottom:1px solid #f3f4f6;"
                        th:text="#{mail.ownerBlocked.table.deadline}">Deadline</th>
                    <th style="text-align:right; color:#6b7280; padding:8px 16px; font-weight:600; border-bottom:1px solid #f3f4f6;"
                        th:text="#{mail.ownerBlocked.table.total}">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${overdueReservations}">
                    <td style="color:#1e1b4b; padding:10px 16px; vertical-align:top; word-break:break-word; border-top:1px solid #f3f4f6;"
                        th:text="${row.vehicleLabel}">Vehicle</td>
                    <td style="color:#b91c1c; font-weight:600; padding:10px 16px; vertical-align:top; word-break:break-word; border-top:1px solid #f3f4f6;"
                        th:text="${row.refundProofDeadlineFormatted}">—</td>
                    <td style="color:#1e1b4b; font-weight:600; padding:10px 16px; vertical-align:top; text-align:right; border-top:1px solid #f3f4f6;"
                        th:text="${row.reservationTotal}">—</td>
                </tr>
            </tbody>
        </table>
    </div>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin-bottom:16px;"
       th:text="#{mail.ownerBlocked.howToUnblock}">
        Upload the pending refund proofs to restore your account.
    </p>

    <div style="margin-bottom:20px;">
        <div style="margin-bottom:10px;">
        <a th:href="${ctaUrl}"
           style="display:inline-block; padding:12px 24px; background-color:#4338ca;
                color:#ffffff; text-decoration:none; border-radius:8px;
                font-size:14px; font-weight:600;"
           th:text="#{mail.ownerBlocked.cta}">
            Open my reservations
        </a>
        </div>
        <p style="font-size:12px; color:#4b5563; line-height:1.6; margin:0;">
            <span th:text="#{mail.common.fallbackAuthLinkCopy}">If the button does not work</span><br/>
            <a th:href="${ctaUrl}" th:text="${ctaUrl}" style="word-break:break-all; color:#4338ca;">https://</a>
        </p>
    </div>

    <hr style="border:none; border-top:1px solid #d1d5db; margin:20px 0;"/>
    <p style="font-size:12px; color:#9ca3af; line-height:1.8;"
       th:text="#{mail.common.footer}">
        Footer
    </p>

    <p style="font-size:18px; color:#9ca3af; letter-spacing:2px; margin-top:16px;">···</p>

</div>
</body>
</html>
