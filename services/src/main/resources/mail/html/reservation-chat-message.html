<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{mail.reservationChatMessage.emailTitle}">New message</title>
</head>
<body style="margin:0; padding:0; background-color:#eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:#1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:#1e1b4b;"><img src="cid:logo"
                                                                           alt="Ryden"
                                                                           style="height:32px; width:auto; vertical-align:middle;"/> Ryden</span>
    </div>

    <p style="font-size:16px; font-weight:700; color:#3730a3; margin-bottom:6px;"
       th:text="#{mail.reservationChatMessage.emailTitle}">
        New message
    </p>
    <p style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:0;"
       th:text="#{mail.common.greeting(${recipientFullName})}">
        Hello,
    </p>

    <p style="font-size:14px; color:#374151; line-height:1.6; margin:20px 0;"
       th:text="#{mail.reservationChatMessage.intro(${senderFullName}, ${vehicleLabel})}">
        Intro
    </p>

    <blockquote style="margin:0 0 24px; padding:12px 16px; border-left:4px solid #6366f1; background:#f5f3ff; color:#374151; font-size:14px; line-height:1.5;"
                th:text="${messagePreview}">
        Preview
    </blockquote>

    <p style="text-align:center; margin:28px 0;">
        <a th:href="${detailUrl}"
           style="display:inline-block; padding:12px 24px; background-color:#4f46e5; color:#ffffff; text-decoration:none; border-radius:8px; font-weight:600; font-size:14px;"
           th:text="#{mail.reservationChatMessage.cta}">
            Open chat
        </a>
    </p>

    <p style="font-size:12px; color:#6b7280; line-height:1.5; margin-top:32px;"
       th:text="#{mail.common.footer}">
        Footer
    </p>

</div>
</body>
</html>
