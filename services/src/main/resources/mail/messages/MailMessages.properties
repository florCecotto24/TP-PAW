# Owner — account blocked because refund-proof deadlines lapsed
mail.ownerBlocked.emailTitle=Your account has been blocked
mail.ownerBlocked.intro=One or more refund-proof deadlines passed without an uploaded receipt, so your account has been blocked. While blocked your cars are hidden from other users and cannot be reserved; existing reservations remain unaffected.
mail.ownerBlocked.overdueListTitle=Pending refund proofs:
mail.ownerBlocked.table.vehicle=Vehicle
mail.ownerBlocked.table.deadline=Deadline
mail.ownerBlocked.table.total=Total
mail.ownerBlocked.howToUnblock=Upload the pending refund receipts from the corresponding reservation detail. Your account is automatically unblocked once every overdue refund proof has been uploaded.
mail.ownerBlocked.cta=Open my reservations
mail.ownerBlocked.subject=Your Ryden account has been blocked

