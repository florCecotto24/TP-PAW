# --- Mail: reservation (request vs confirmed) ---
# English (default / fallback). Copy is chosen from the recipient's message language.
# Locale files: mail/messages/MailMessages_es.properties (es), mail/messages/MailMessages_en.properties (en: empty, inherits this file).

mail.common.footer=This message was sent automatically. Please do not reply to this email.
mail.common.fallbackAuthLinkCopy=If the button does not work, copy and paste this link into your browser:
mail.common.greeting=Hello {0},
mail.common.promptContactOwner=If you have any questions, please contact the owner of the vehicle:
mail.common.promptContactRider=If you have any questions, please contact the rider:

# First email after the rider submits the form (payment proof still pending)
mail.reservationRequestSent.emailTitle=Reservation request sent
mail.reservationRequestSent.introRider=We received your reservation request. It is not final until you upload a payment receipt within the deadline. Here are the details:
mail.reservationRequestSent.introOwner=You have a new reservation request pending payment proof. Here are the details:
mail.reservationRequestSent.subject=Reservation request sent — {0}
mail.reservationRequestReceived.emailTitle=Reservation request received
mail.reservationRequestReceived.introOwner=You have a new reservation request pending payment proof. Here are the details:
mail.reservationRequestReceived.subject=Reservation request received — {0}

mail.common.notAvailable=Not on file

# Rider only — reminder when the payment-proof deadline is within app.reservation.payment-proof-reminder-lead-hours from "now".
mail.reservationDuePaymentProof.emailTitle=Payment proof due soon
mail.reservationDuePaymentProof.introRider=There is not much time left before the deadline to upload a payment receipt and confirm your reservation. Please upload it as soon as possible so you do not lose the spot. When we send this message, you have up to {0} hours left; if the receipt is not uploaded in time, the reservation will be cancelled. Here are the details:
mail.reservationDuePaymentProof.subject=Reminder: upload payment proof — {0}

# Rider only, after payment proof is uploaded (full address including street number is shown)
mail.reservationConfirmedAfterProof.emailTitle=Reservation confirmed
mail.reservationConfirmedAfterProof.introRider=We received your payment receipt. Your reservation is confirmed. Full pickup and return address:
mail.reservationConfirmedAfterProof.subject=Reservation confirmed — {0}

